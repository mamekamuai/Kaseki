<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {

    display:flex; justify-content:center;
  }
  #wrap { width:100%; max-width:420px; min-height:100dvh; display:flex; flex-direction:column; }

  header {
    padding:14px 16px 10px;
    border-bottom:2px solid #3a3026;
    display:flex; justify-content:space-between; align-items:baseline;
  }
  header h1 { font-size:16px; color:#f0d080; letter-spacing:2px; }
  header .gold { font-size:12px; color:#c8b89a; }
  header .gold span { color:#ffd23a; font-weight:bold; }

  #body { flex:1; overflow-y:auto; padding-bottom:90px; }

  /* --- リスト画面 --- */
  #filter-bar {
    display:flex; gap:6px; padding:8px 16px; overflow-x:auto;
    border-bottom:1px solid #2a241c;
  }
  .filter-btn {
    flex:0 0 auto; padding:4px 10px; font-size:11px; border-radius:12px;
    border:1px solid #4a3e2a; background:#221e18; color:#8a7c64; cursor:pointer;
  }
  .filter-btn.active { background:#5a3e28; border-color:#d4a843; color:#f0d080; }

  #sort-bar {
    display:flex; align-items:center; gap:8px; padding:6px 16px;
    border-bottom:1px solid #2a241c;
  }
  #sort-bar label { font-size:11px; color:#8a7c64; }
  #sort-select {
    flex:1; padding:5px 8px; border-radius:8px; border:1px solid #4a3e2a;
    background:#221e18; color:#f0d080; font-size:11px;
  }

  #inventory-list {
    padding:10px 16px;
    display:grid; grid-template-columns:repeat(3,1fr); gap:8px;
  }
  .inv-card {
    background:#221e18; border:2px solid #3a3026; border-radius:8px;
    padding:8px 6px; text-align:center; cursor:pointer; position:relative;
    transition:transform 0.1s;
  }
  .inv-card.rarity-common { border-color:#8a8272; }
  .inv-card.rarity-rare   { border-color:#4dc8ff; box-shadow:0 0 6px rgba(77,200,255,0.35); }
  .inv-card.rarity-epic   { border-color:#b478ff; box-shadow:0 0 6px rgba(180,120,255,0.4); background:linear-gradient(180deg,#241e2e,#221e18); }
  .inv-card.rarity-title  { border-color:#ffd700; box-shadow:0 0 9px rgba(255,215,0,0.5); background:linear-gradient(180deg,#2e2814,#221e18); }
  .inv-card .elem { font-size:22px; }
  .inv-card .name { font-size:11px; color:#f0d080; margin-top:2px; }
  .inv-card .rarity { font-size:9px; margin-top:2px; letter-spacing:1px; }
  .inv-card .lv { font-size:9px; color:#8a7c64; }
  .inv-card .power { font-size:9px; color:#ff9a4a; font-weight:bold; margin-top:2px; }
  .inv-card .perfect-badge {
    position:absolute; top:2px; right:4px; font-size:10px; color:#ffd700;
  }
  .inv-card .crest-badge {
    position:absolute; top:2px; left:4px; font-size:12px;
    filter:drop-shadow(0 0 2px rgba(255,215,0,0.8));
  }
  #empty-msg { grid-column:1/-1; text-align:center; color:#5c5248; font-size:12px; padding:40px 0; }

  /* --- 詳細画面 --- */
  #detail-view { display:none; padding:14px 16px; }
  #detail-view.show { display:block; }
  #inventory-view.hide { display:none; }

  .back-link { display:inline-block; color:#8a7c64; font-size:12px; margin-bottom:10px; cursor:pointer; }

  .detail-header { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:4px; }
  .detail-header h2 { font-size:20px; color:#f0d080; }
  .rarity-badge { font-size:10px; padding:2px 8px; border-radius:4px; border:1px solid currentColor; }
  .motif { font-size:11px; color:#8a7c64; margin:6px 0 14px; line-height:1.5; }

  .section-label { font-size:10px; color:#a8916a; margin:14px 0 6px; letter-spacing:1px; }

  .stat-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; }
  .stat-box { background:#221e18; border-radius:6px; padding:8px 4px; text-align:center; }
  .stat-box .label { font-size:9px; color:#8a7c64; }
  .stat-box .value { font-size:16px; font-weight:bold; color:#f0d080; margin-top:2px; }
  .stat-box .mul { font-size:10px; margin-top:2px; }
  .stat-box .mul.high { color:#ffd700; }
  .stat-box .mul.mid { color:#a0e880; }
  .stat-box .mul.none { color:#5c5248; }

  .perfect-banner {
    background:linear-gradient(90deg,#5a4310,#3a2a08);
    border:1px solid #d4a843; border-radius:8px;
    padding:8px 12px; font-size:12px; color:#ffd700;
    text-align:center; margin-bottom:10px;
  }

  #d-power-bar {
    text-align:center; padding:8px; margin-bottom:10px;
    background:#221e18; border:1px solid #3a3026; border-radius:8px;
    font-size:13px; font-weight:bold; color:#c8b89a;
  }
  #d-power-bar span { color:#ff9a4a; font-size:16px; }

  .breakdown-row {
    display:flex; justify-content:space-between; font-size:12px;
    color:#c8b89a; padding:6px 2px; border-bottom:1px solid #2a241c;
  }
  .breakdown-row span:last-child { color:#f0d080; }

  #strengthen-box {
    margin-top:16px; background:#221e18; border:1px solid #3a3026;
    border-radius:10px; padding:14px;
  }
  #strengthen-box .lv-row {
    display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px;

  #strengthen-box .lv-row .cost { font-size:12px; color:#8a7c64; }
  #strengthen-box .lv-row .cost span { color:#ffd23a; }

  #btn-strengthen {
    width:100%; padding:12px; border-radius:8px; border:none;
    background:linear-gradient(180deg,#d4a843,#a07820); color:#1a1410;
    font-size:14px; font-weight:bold; letter-spacing:2px; cursor:pointer;
  }
  #btn-strengthen:disabled { background:#3a3a3a; color:#777; cursor:not-allowed; }
  #strengthen-msg { text-align:center; font-size:11px; color:#8a7c64; margin-top:8px; min-height:14px; }

  #awaken-box {
    margin-top:14px; padding-top:14px; border-top:1px dashed #3a3026;
  }

  #d-awaken-req { font-size:11px; color:#8a7c64; margin-bottom:8px; line-height:1.6; }
  #d-awaken-req .ok { color:#a0e880; }
  #d-awaken-req .ng { color:#ff8866; }
  #btn-awaken {
    width:100%; padding:12px; border-radius:8px; border:none;
    background:linear-gradient(180deg,#8c50e0,#5a2ca0); color:#fff;
    font-size:14px; font-weight:bold; letter-spacing:2px; cursor:pointer;
  }

  #awaken-msg { text-align:center; font-size:11px; color:#8a7c64; margin-top:8px; min-height:14px; }

  footer {
    position:fixed; bottom:0; left:50%; transform:translateX(-50%);

          <option value="rarity">レアリティ順</option>
          <option value="level">レベル順</option>
          <option value="hp">HP順</option>
          <option value="atk">攻撃力順</option>
          <option value="def">防御力順</option>
          <option value="spd">素早さ順</option>
        </select>
      </div>
      <div id="inventory-list"></div>
    </div>

    <div id="detail-view">
      <span class="back-link" id="back-btn">◀ 一覧へ戻る</span>
      <div class="detail-header">
        <h2 id="d-name"></h2>
        <span class="rarity-badge" id="d-rarity"></span>
      </div>
      <div class="motif" id="d-motif"></div>

      <div class="stat-grid" id="d-individuality"></div>

      <div class="breakdown-row"><span>発掘評価</span><span id="d-dig-grade"></span></div>

        <div class="lv-row">

          <span class="cost" id="d-cost-label"></span>
        </div>
        <button id="btn-strengthen">強化する</button>
        <div id="strengthen-msg"></div>
      </div>

        </div>
        <div id="d-awaken-req"></div>
        <button id="btn-awaken">覚醒する</button>
        <div id="awaken-msg"></div>
      </div>
    </div>
  </div>

  <footer>
    <a href="title.html">タイトルへ</a>

</div>

    Object.entries(TIER_MULTIPLIER).map(([k, v]) => [k, Math.round(POWER_BASE * v)])
  );
  // 対象数減衰：単体1.0倍／複数体(2〜4体)0.5倍／全体0.45倍
  const TARGET_COUNT_MULTIPLIER = { 1: 1.0, 2: 0.5, 3: 0.5, 4: 0.5, all: 0.45 };

  ];
  function rollOneStat() {
    const r = Math.random() * 100;
    let acc = 0;
    for (const e of INDIVIDUALITY_TABLE) { acc += e.w; if (r < acc) return e.v; }
    return 1.0;
  }
  function rollIndividuality() {
    if (Math.random() < 0.01) return { hp: 1.5, atk: 1.5, def: 1.5, spd: 1.5, perfect: true };

    // 称号(TITLE)キャラは弱点を持たない特別枠：

    if (atkRarity === 'title') return 1.3;

    if (!atkEl || atkEl === 'none') return 1.0;

    if (!c) return 1.0;
    if (c.strong === defEl) return 2.0;
    if (c.weak === defEl) return 0.5;
    return 1.0;
  }

  function getCharacterMaster(id) {
    return CHARACTER_MASTER.find((c) => c.id === id) || null;
  }

  // ============================================================
  // セーブデータ（localStorage）
  // ============================================================
  const STORAGE_KEYS = {
    inventory: 'kaseki_inventory',   // 所持キャラ一覧（発掘で獲得した個体）
    gold: 'kaseki_gold',
    party: 'kaseki_party',           // 編成中のuid配列（最大3）
    stones: 'kaseki_rocks',          // 「岩」の所持数（旧形式・移行元）
    rocksV2: 'kaseki_rocks_v2',       // 「岩」タイプ別所持数
    awakenMaterials: 'kaseki_awaken_materials', // 覚醒石の所持数（属性ごと）
    playerLevel: 'kaseki_player_level',
    playerExp: 'kaseki_player_exp',
    stamina: 'kaseki_stamina',
    staminaTs: 'kaseki_stamina_ts',  // 最後にスタミナを計算した時刻(ms)
    rating: 'kaseki_rating',         // 闘技場レート
    questUnlock: 'kaseki_quest_unlock',     // 解放済みクエストステージ(最大値)
    dungeonUnlock: 'kaseki_dungeon_unlock', // 解放済みダンジョン難易度({種別:属性 -> 最大値})
    starterGranted: 'kaseki_starter_granted', // 初回スターター(各属性コモン1体)付与済みフラグ
  };

  function loadInventory() {
    try {
      const raw = localStorage.getItem(STORAGE_KEYS.inventory);
      return raw ? JSON.parse(raw) : [];
    } catch (e) {
      return [];
    }
  }

  function saveInventory(list) {
    localStorage.setItem(STORAGE_KEYS.inventory, JSON.stringify(list));
  }

  /**
   * 発掘完了時に呼ぶ：新しいキャラ個体をインベントリに追加する
   * @param {string} charId - CHARACTER_MASTERのid
   * @param {string} digGrade - 'S'|'A'|'B'|'C'|'D'
   * @returns {object} 追加された個体データ
   */
  function addCharacterToInventory(charId, digGrade) {
    const master = getCharacterMaster(charId);
    if (!master) throw new Error('Unknown character id: ' + charId);
    const individuality = rollIndividuality();
    const instance = {
      uid: 'inst_' + Date.now() + '_' + Math.floor(Math.random() * 100000),
      charId,
      digGrade,
      individuality,
      level: 1,
      obtainedAt: Date.now(),
    };
    const inv = loadInventory();
    inv.push(instance);
    saveInventory(inv);
    return instance;
  }

  // 初回プレイ時のみ：各属性のCOMMON個体を1体ずつ自動付与する（各属性の雰囲気を最初から確認できるように）
  const STARTER_CHAR_IDS = ['fire01', 'water01', 'earth01', 'thunder01', 'wind01'];
  function grantStarterCharactersIfFirstTime() {
    if (localStorage.getItem(STORAGE_KEYS.starterGranted)) return false;
    const inv = loadInventory();
    if (inv.length > 0) {
      // すでに何らかの所持キャラがいる場合は「初回」とは見なさず、何もしない
      localStorage.setItem(STORAGE_KEYS.starterGranted, '1');
      return false;
    }
    STARTER_CHAR_IDS.forEach(id => addCharacterToInventory(id, 'B'));
    localStorage.setItem(STORAGE_KEYS.starterGranted, '1');
    return true;
  }

  /**
   * 強化倍率（16章改訂版）：レベル帯ごとに伸び率が加速するバンド制
   * Lv1〜50は強化のみで到達可能（約×3.0）。Lv51以降は覚醒で上限を+10ずつ解放しないと入れない領域で、
   * 伸び率はLv41〜50と同じ+6%/Lvを維持（これ以上は加速させず、覚醒側のボーナスで伸ばす設計）
   */
  const STRENGTHEN_BANDS = [
    { from: 2,   to: 10,  rate: 0.02 }, // Lv2〜10：+2%/Lv（+18%）
    { from: 11,  to: 20,  rate: 0.03 }, // Lv11〜20：+3%/Lv（+30%）
    { from: 21,  to: 30,  rate: 0.04 }, // Lv21〜30：+4%/Lv（+40%）
    { from: 31,  to: 40,  rate: 0.05 }, // Lv31〜40：+5%/Lv（+50%）
    { from: 41,  to: 50,  rate: 0.06 }, // Lv41〜50：+6%/Lv（+60%）※強化単体の上限はここ
    { from: 51,  to: 60,  rate: 0.06 }, // 覚醒1後：+6%/Lv（+60%）
    { from: 61,  to: 70,  rate: 0.06 }, // 覚醒2後：+6%/Lv（+60%）
    { from: 71,  to: 80,  rate: 0.06 }, // 覚醒3後：+6%/Lv（+60%）
    { from: 81,  to: 90,  rate: 0.06 }, // 覚醒4後：+6%/Lv（+60%）
    { from: 91,  to: 100, rate: 0.06 }, // 覚醒5後：+6%/Lv（+60%）
  ];
  function getStrengthenBandBonus(lv) {
    let bonus = 0;
    for (const band of STRENGTHEN_BANDS) {
      if (lv < band.from) break;
      const upper = Math.min(lv, band.to);
      bonus += (upper - band.from + 1) * band.rate;
    }
    return bonus; // Lv50で+1.98(≒×3)、Lv100(覚醒5込み)で+4.98(≒×6)
  }

  // --- 覚醒 ---
  // 覚醒1回につきステータス+25%（強化ボーナスとは同じ枠で加算＝掛け算の暴走を防ぐ設計）
  const AWAKEN_STAT_BONUS = 0.25;
  const AWAKEN_MAX_COUNT = 5;
  const BASE_LEVEL_CAP = 50;
  function getMaxLevelCap(awakenCount) {
    return Math.min(100, BASE_LEVEL_CAP + (awakenCount || 0) * 10);
  }
  function getAwakenBonus(awakenCount) {
    return (awakenCount || 0) * AWAKEN_STAT_BONUS; // 5回で+125%
  }
  // 覚醒に必要なゴールド・専用素材（素材は対象キャラの属性の「覚醒石」、ダンジョン産）
  // 段階が上がるほどゴールド・素材ともに要求量が増える
  const AWAKEN_REQUIREMENTS = [
    { gold: 5000,  material: 3 },  // 1覚醒目：Lv50到達が条件
    { gold: 12000, material: 5 },  // 2覚醒目：Lv60到達が条件
    { gold: 25000, material: 8 },  // 3覚醒目：Lv70到達が条件
    { gold: 45000, material: 12 }, // 4覚醒目：Lv80到達が条件
    { gold: 75000, material: 18 }, // 5覚醒目：Lv90到達が条件
  ];
  function getAwakenRequirement(nextAwakenCount) {
    return AWAKEN_REQUIREMENTS[nextAwakenCount - 1] || null;
  }
  // レベル帯が上がる（＝覚醒で解放した領域に入る）ほど1レベルあたりのゴールドコストも増加
  const STRENGTHEN_COST_TIER_MUL = [1, 1.5, 2.0, 2.5, 3.0, 3.5]; // [Lv1-50, 51-60, 61-70, 71-80, 81-90, 91-100]
  function getStrengthenCostTierMul(lv) {
    if (lv <= 50) return STRENGTHEN_COST_TIER_MUL[0];
    const tier = Math.min(5, Math.ceil((lv - 50) / 10));
    return STRENGTHEN_COST_TIER_MUL[tier];
  }

  /**
   * 所持個体の最終ステータスを計算する
   * 最終ステータス = 基礎値 × レアリティ補正 × 個体差倍率 × 発掘評価補正 × (1 + 強化ボーナス + 覚醒ボーナス)
   * @param {object} instance - loadInventory()の要素
   * @param {number} [titleDungeonDifficulty] - 称号ダンジョン挑戦時のみ、HPに難易度倍率をかける
   */
  function calculateInstanceStats(instance, titleDungeonDifficulty) {
    const master = getCharacterMaster(instance.charId);
    if (!master) return null;
    const rarityMul = RARITY_MUL[master.rarity] || 1.0;
    const digMul = DIG_GRADE_MUL[instance.digGrade] || 1.0;
    const ind = instance.individuality || { hp: 1, atk: 1, def: 1, spd: 1 };
    const lv = instance.level || 1;
    const awakenCount = instance.awakenCount || 0;
    const strengthenMul = 1 + getStrengthenBandBonus(lv) + getAwakenBonus(awakenCount);
    const hpDiffMul = master.rarity === 'title' && titleDungeonDifficulty
      ? (TITLE_DUNGEON_HP_MUL[titleDungeonDifficulty] || 1)
      : 1;
    const b = master.baseStats;
    return {
      hp: Math.round(b.hp * rarityMul * ind.hp * digMul * strengthenMul * hpDiffMul),
      atk: Math.round(b.atk * rarityMul * ind.atk * digMul * strengthenMul),
      def: Math.round(b.def * rarityMul * ind.def * digMul * strengthenMul),
      spd: Math.round(b.spd * rarityMul * ind.spd * digMul * strengthenMul),
      sp: Math.round((b.sp || 100) * rarityMul), // 最大SPはキャラごとの基礎値×レアリティ補正（個体差・強化は影響しない）
    };
  }

  // --- ゴールド ---
  function getGold() {
    return parseInt(localStorage.getItem(STORAGE_KEYS.gold) || '500', 10);
  }
  function setGold(v) {
    localStorage.setItem(STORAGE_KEYS.gold, String(Math.max(0, Math.round(v))));
  }
  function addGold(delta) {
    setGold(getGold() + delta);
  }

  // --- 闘技場レート ---
  const RATING_START = 1500;
  const RATING_MIN = 1000;
  function getRating() {
    return parseInt(localStorage.getItem(STORAGE_KEYS.rating) || String(RATING_START), 10);
  }
  function setRating(v) {
    localStorage.setItem(STORAGE_KEYS.rating, String(Math.max(RATING_MIN, Math.round(v))));
  }
  function addRating(delta) {
    setRating(getRating() + delta);
  }

  // --- プレイヤーレベル（スタミナ上限に影響、Lv100が上限） ---
  const PLAYER_LEVEL_CAP = 100;
  const STAMINA_START = 20;   // 初期スタミナ上限（プレイヤーLv1時点）
  const STAMINA_MAX_CAP = 300; // スタミナ上限の絶対最大値（Lv100到達で到達）
  const STAMINA_PER_LEVEL = (STAMINA_MAX_CAP - STAMINA_START) / (PLAYER_LEVEL_CAP - 1); // Lv1→100で20→300になるよう均等割り（約2.83/Lv）
  const STAMINA_REGEN_MS = 5 * 60 * 1000; // 5分で1回復
  const PLAYER_EXP_PER_LEVEL = 50; // Lvごとに必要EXPが+50ずつ増える(Lv1→2は50, Lv2→3は100…)

  function getPlayerLevel() {
    return parseInt(localStorage.getItem(STORAGE_KEYS.playerLevel) || '1', 10);
  }
  function getPlayerExp() {
    return parseInt(localStorage.getItem(STORAGE_KEYS.playerExp) || '0', 10);
  }
  function getExpToNextLevel(level) {
    return level * PLAYER_EXP_PER_LEVEL;
  }
  function getMaxStamina(level) {
    const lv = Math.min(PLAYER_LEVEL_CAP, level || getPlayerLevel());
    return Math.round(Math.min(STAMINA_MAX_CAP, STAMINA_START + (lv - 1) * STAMINA_PER_LEVEL));
  }
  // プレイヤーEXPを加算し、必要ならレベルアップさせる（複数レベル分一気に上がるケースも考慮。Lv100でカンスト）
  function addPlayerExp(amount) {
    let level = getPlayerLevel();
    if (level >= PLAYER_LEVEL_CAP) {
      return { level: PLAYER_LEVEL_CAP, exp: 0, leveledUp: false }; // カンスト済みはEXPを受け取らない
    }
    let exp = getPlayerExp() + amount;
    let leveledUp = false;
    let stamBonus = 0; // レベルアップごとの「そのレベルのMAX値」を丸ごと積み上げる
    while (level < PLAYER_LEVEL_CAP && exp >= getExpToNextLevel(level)) {
      exp -= getExpToNextLevel(level);
      level += 1;
      leveledUp = true;
      stamBonus += getMaxStamina(level); // 差分ではなく、そのレベル時点のMAX値をまるごと加算
    }
    if (level >= PLAYER_LEVEL_CAP) {
      level = PLAYER_LEVEL_CAP;
      exp = 0; // カンスト到達時は端数EXPを切り捨てて0にする
    }
    localStorage.setItem(STORAGE_KEYS.playerLevel, String(level));
    localStorage.setItem(STORAGE_KEYS.playerExp, String(exp));
    if (leveledUp) {
      // 残っていたスタミナ＋新MAX値をそのまま加算（上限を超えるオーバーフローも許容する）
      const stam = getStamina();
      setStaminaRaw(stam + stamBonus);
    }
    return { level, exp, leveledUp };
  }

  // --- スタミナ ---
  function setStaminaRaw(v) {
    localStorage.setItem(STORAGE_KEYS.stamina, String(Math.max(0, Math.round(v))));
    localStorage.setItem(STORAGE_KEYS.staminaTs, String(Date.now()));
  }
  // 経過時間分のスタミナ自然回復を計算してから現在値を返す
  // ※レベルアップ直後などで上限を超えている場合はそのオーバーフローをそのまま維持する（自然減少で消費されるまで残る）
  function getStamina() {
    const max = getMaxStamina();
    const rawStam = localStorage.getItem(STORAGE_KEYS.stamina);
    const rawTs = localStorage.getItem(STORAGE_KEYS.staminaTs);
    if (rawStam === null || rawTs === null) {
      setStaminaRaw(STAMINA_START);
      return STAMINA_START;
    }
    let stam = parseInt(rawStam, 10);
    const ts = parseInt(rawTs, 10);
    if (stam >= max) {
      return stam; // 上限以上ならそのまま返す（減算するまでオーバーフローを保持）
    }
    const elapsedMs = Date.now() - ts;
    const regen = Math.floor(elapsedMs / STAMINA_REGEN_MS);
    if (regen > 0) {
      stam = Math.min(max, stam + regen);
      const remainderTs = ts + regen * STAMINA_REGEN_MS;
      localStorage.setItem(STORAGE_KEYS.stamina, String(stam));
      localStorage.setItem(STORAGE_KEYS.staminaTs, String(remainderTs));
    }
    return stam;
  }
  function getMsToNextStamina() {
    const max = getMaxStamina();
    const stam = getStamina();
    if (stam >= max) return 0;
    const ts = parseInt(localStorage.getItem(STORAGE_KEYS.staminaTs) || String(Date.now()), 10);
    return Math.max(0, STAMINA_REGEN_MS - (Date.now() - ts));
  }
  function hasEnoughStamina(cost) {
    return getStamina() >= cost;
  }
  // スタミナを消費する。足りなければ何もせずfalseを返す
  function consumeStamina(cost) {
    const cur = getStamina();
    if (cur < cost) return false;
    setStaminaRaw(cur - cost);
    return true;
  }

  // --- 覚醒素材（属性ごとの「覚醒石」。ダンジョン産／今はまだダンジョン未実装なので付与手段は今後追加） ---
  function getAwakenMaterials() {
    try {
      const raw = localStorage.getItem(STORAGE_KEYS.awakenMaterials);
      return raw ? JSON.parse(raw) : {};
    } catch (e) {
      return {};
    }
  }
  function getAwakenMaterialCount(element) {
    return getAwakenMaterials()[element] || 0;
  }
  function addAwakenMaterial(element, delta) {
    const m = getAwakenMaterials();
    m[element] = Math.max(0, (m[element] || 0) + delta);
    localStorage.setItem(STORAGE_KEYS.awakenMaterials, JSON.stringify(m));
    return m[element];
  }

  // --- 強化 ---
  function goldToNextLevel(currentLevel, awakenCount) {
    const cap = getMaxLevelCap(awakenCount || 0);
    if (currentLevel >= cap) return null;
    return Math.round(currentLevel * 100 * getStrengthenCostTierMul(currentLevel)); // Lv×100G×帯倍率
  }
  function strengthenInstance(uid) {
    const inv = loadInventory();
    const inst = inv.find((i) => i.uid === uid);
    if (!inst) return { ok: false, reason: 'not_found' };
    const cost = goldToNextLevel(inst.level, inst.awakenCount || 0);
    if (cost === null) return { ok: false, reason: 'max_level' };
    if (getGold() < cost) return { ok: false, reason: 'not_enough_gold' };
    addGold(-cost);
    inst.level += 1;
    saveInventory(inv);
    return { ok: true, newLevel: inst.level, spentGold: cost };
  }

  /**
   * 覚醒を実行する。条件：現在の覚醒段階の上限レベルまで強化済み、かつゴールド・専用素材が足りていること
   */
  function awakenInstance(uid) {
    const inv = loadInventory();
    const inst = inv.find((i) => i.uid === uid);
    if (!inst) return { ok: false, reason: 'not_found' };
    const master = getCharacterMaster(inst.charId);
    if (!master) return { ok: false, reason: 'not_found' };
    const cur = inst.awakenCount || 0;
    if (cur >= AWAKEN_MAX_COUNT) return { ok: false, reason: 'max_awaken' };
    const requiredLevel = getMaxLevelCap(cur);
    if ((inst.level || 1) < requiredLevel) {
      return { ok: false, reason: 'level_not_maxed', requiredLevel };
    }
    const req = getAwakenRequirement(cur + 1);
    if (!req) return { ok: false, reason: 'no_requirement_data' };
    if (getGold() < req.gold) return { ok: false, reason: 'not_enough_gold', need: req.gold };
    const materialKey = master.element || 'title';
    const haveMaterial = getAwakenMaterialCount(materialKey);
    if (haveMaterial < req.material) {
      return { ok: false, reason: 'not_enough_material', need: req.material, have: haveMaterial, element: materialKey };
    }
    addGold(-req.gold);
    addAwakenMaterial(materialKey, -req.material);
    inst.awakenCount = cur + 1;
    saveInventory(inv);
    return {
      ok: true,
      newAwakenCount: inst.awakenCount,
      newLevelCap: getMaxLevelCap(inst.awakenCount),
      spentGold: req.gold,
      spentMaterial: req.material,
    };
  }

  // --- 「岩」（タイプ別：ノーマル／属性5種／イベント(称号)） ---
  const ROCK_TYPES = ['normal', 'fire', 'water', 'earth', 'thunder', 'wind', 'quality', 'event'];
  const ROCK_TYPE_INFO = {
    normal:  { label: 'ノーマル岩',   color: '#8a8272', icon: '🪨' },
    fire:    { label: '火属性岩',     color: '#ff8844', icon: '🔥' },
    water:   { label: '水属性岩',     color: '#4dc8ff', icon: '💧' },
    earth:   { label: '土属性岩',     color: '#c89858', icon: '🪨' },
    thunder: { label: '雷属性岩',     color: '#f0d840', icon: '⚡' },
    wind:    { label: '風属性岩',     color: '#88e0a8', icon: '🌬️' },
    quality: { label: '上質岩',       color: '#ff9a4a', icon: '💎' }, // 岩ダンジョン産。ノーマル岩よりレア/エピックが出やすい
    event:   { label: 'イベント岩',   color: '#ffd700', icon: '👑' }, // 称号キャラ専用。色は全称号共通の金色に統一
  };
  function loadRocks() {
    try {
      const raw = localStorage.getItem(STORAGE_KEYS.rocksV2);
      if (raw) return JSON.parse(raw);
    } catch (e) { /* fallthrough */ }
    // 旧形式（種別なしの単一カウント）からの移行
    const legacy = parseInt(localStorage.getItem(STORAGE_KEYS.stones) || '3', 10);
    const init = { normal: legacy, fire: 0, water: 0, earth: 0, thunder: 0, wind: 0, event: 0 };
    saveRocks(init);
    return init;
  }
  function saveRocks(obj) {
    localStorage.setItem(STORAGE_KEYS.rocksV2, JSON.stringify(obj));
  }
  function getRockCount(type) {
    return loadRocks()[type || 'normal'] || 0;
  }
  function getAllRockCounts() {
    const r = loadRocks();
    const out = {};
    ROCK_TYPES.forEach(t => { out[t] = r[t] || 0; });
    return out;
  }
  function setRockCount(v, type) {
    const r = loadRocks();
    r[type || 'normal'] = Math.max(0, Math.round(v));
    saveRocks(r);
  }
  function addRocks(delta, type) {
    const r = loadRocks();
    const key = type || 'normal';
    r[key] = Math.max(0, (r[key] || 0) + delta);
    saveRocks(r);
    return r[key];
  }
  function useRock(type) {
    const r = loadRocks();
    const key = type || 'normal';
    if ((r[key] || 0) <= 0) return false;
    r[key] -= 1;
    saveRocks(r);
    return true;
  }

  // --- 総合力（ドラエグ風の分かりやすい単一指標） ---
  // HPは大きい数値のため1/10で正規化し、他ステータスと重み付け合算する
  function calculatePower(stats) {
    if (!stats) return 0;
    return Math.round(stats.hp / 10 + stats.atk * 3 + stats.def * 3 + stats.spd * 2 + (stats.sp || 0) * 1);
  }

  // --- クエストステージ解放状況（1〜20、クリアで次が解放） ---
  const QUEST_MAX_STAGE = 20;
  function getQuestUnlockedStage() {
    return Math.min(QUEST_MAX_STAGE, parseInt(localStorage.getItem(STORAGE_KEYS.questUnlock) || '1', 10));
  }
  function reportQuestStageCleared(stageNum) {
    const cur = getQuestUnlockedStage();
    // 現在の最前線ステージ(cur)をクリアした時だけ次を解放する（UI側で未解放ステージは選べない前提の保険）
    if (stageNum === cur && cur < QUEST_MAX_STAGE) {
      localStorage.setItem(STORAGE_KEYS.questUnlock, String(Math.min(QUEST_MAX_STAGE, cur + 1)));
    }
  }

  // --- ダンジョン難易度解放状況（種別・属性ごとに個別管理） ---
  function dungeonUnlockKey(kind, element) {
    return `${kind}:${element || ''}`;
  }
  function loadDungeonUnlocks() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEYS.dungeonUnlock) || '{}');
    } catch (e) {
      return {};
    }
  }
  function getDungeonUnlockedDifficulty(kind, element) {
    const m = loadDungeonUnlocks();
    return m[dungeonUnlockKey(kind, element)] || 1;
  }
  function reportDungeonDifficultyCleared(kind, element, difficulty, maxDifficulty) {
    const m = loadDungeonUnlocks();
    const key = dungeonUnlockKey(kind, element);
    const cur = m[key] || 1;
    if (difficulty === cur && cur < maxDifficulty) {
      m[key] = Math.min(maxDifficulty, cur + 1);
      localStorage.setItem(STORAGE_KEYS.dungeonUnlock, JSON.stringify(m));
    }
  }

  // --- 編成（パーティ） ---
  function loadParty() {
    try {
      const raw = localStorage.getItem(STORAGE_KEYS.party);
      return raw ? JSON.parse(raw) : [];
    } catch (e) {
      return [];
    }
  }
  function saveParty(uids) {
    localStorage.setItem(STORAGE_KEYS.party, JSON.stringify(uids.slice(0, 6)));
  }

  /**
   * 編成中パーティを auto-battle.html が使える戦闘用データ形式に変換
   */
  function getPartyAsFighterDefs() {
    const inv = loadInventory();
    const party = loadParty();
    const defs = party
      .map((uid) => inv.find((i) => i.uid === uid))
      .filter(Boolean)
      .map((inst) => {
        const master = getCharacterMaster(inst.charId);
        const stats = calculateInstanceStats(inst);
        return {
          uid: inst.uid,
          name: master.name,
          element: master.element,
          rarity: master.rarity,
          level: inst.level,
          skills: master.skills,
          stats, // { hp, atk, def, spd } 計算済み
        };
      });
    return defs;
  }

  // ============================================================
  // ダメージ計算（10章のダメージ計算式）
  // ============================================================
  function calculateDamage(power, atk, def, atkElement, defElement, targetMul, atkRarity, defRarity) {
    const eff = getTypeMultiplier(atkElement, defElement, atkRarity, defRarity);
    const rng = 0.85 + Math.random() * 0.15;
    const raw = power * (targetMul || 1.0) * (atk / def) * eff * rng;
    return { dmg: Math.max(1, Math.round(raw)), eff };
  }

  // ============================================================
  // 発掘用：発掘ミニゲームが使うFOSSILS形式へ変換するヘルパー
  // ============================================================
  function getNormalCharacterList() {
    // TITLE(称号)キャラは通常発掘の対象外
    return CHARACTER_MASTER.filter((c) => c.rarity !== 'title');
  }

  // ============================================================
  // 公開API
  // ============================================================
  const GameData = {
    // 定数
    TYPE_CHART, ELEM_ICONS, ELEM_COLORS, ELEM_LABEL,
    RARITY_MUL, RARITY_LABEL, RARITY_COLOR, DIG_GRADE_MUL,
    TIER_POWER, TIER_MULTIPLIER, POWER_BASE, TARGET_COUNT_MULTIPLIER, TITLE_DUNGEON_HP_MUL,
    BASE_LEVEL_CAP, AWAKEN_MAX_COUNT, AWAKEN_STAT_BONUS, AWAKEN_REQUIREMENTS,
    CHARACTER_MASTER,

    // ロジック
    getTypeMultiplier,
    getTargetMultiplier,
    rollIndividuality,
    calculateDamage,
    getCharacterMaster,
    getNormalCharacterList,
    calculateInstanceStats,
    getStrengthenBandBonus,
    getMaxLevelCap,
    getAwakenBonus,
    getAwakenRequirement,
    getStrengthenCostTierMul,

    // セーブデータ
    loadInventory,
    saveInventory,
    addCharacterToInventory,
    grantStarterCharactersIfFirstTime,
    getGold,
    setGold,
    addGold,
    getRating,
    setRating,
    addRating,
    RATING_START,
    RATING_MIN,
    goldToNextLevel,
    strengthenInstance,
    awakenInstance,
    getAwakenMaterials,
    getAwakenMaterialCount,
    addAwakenMaterial,
    getRockCount,
    setRockCount,
    addRocks,
    useRock,
    getAllRockCounts,
    ROCK_TYPES,
    ROCK_TYPE_INFO,
    calculatePower,
    QUEST_MAX_STAGE,
    getQuestUnlockedStage,
    reportQuestStageCleared,
    getDungeonUnlockedDifficulty,
    reportDungeonDifficultyCleared,
    loadParty,
    saveParty,
    getPartyAsFighterDefs,
    // プレイヤーレベル・スタミナ
    STAMINA_START, STAMINA_MAX_CAP, STAMINA_PER_LEVEL, STAMINA_REGEN_MS, PLAYER_LEVEL_CAP,
    getPlayerLevel,
    getPlayerExp,
    getExpToNextLevel,
    addPlayerExp,
    getMaxStamina,
    getStamina,
    getMsToNextStamina,
    hasEnoughStamina,
    consumeStamina,
  };

  if (typeof module !== 'undefined' && module.exports) {
    module.exports = GameData;
  } else {
    global.GameData = GameData;
  }
})(typeof window !== 'undefined' ? window : globalThis);

</script>
<script>
GameData.grantStarterCharactersIfFirstTime();
let inventory = GameData.loadInventory();
let currentFilter = 'all';
let currentSort = 'obtained';
let selectedUid = null;

const RARITY_RANK = { common: 0, rare: 1, epic: 2, title: 3 };

function refreshGold() {
  document.getElementById('gold-val').textContent = GameData.getGold();
}

function statMulClass(v) {
  if (v >= 1.5) return 'high';
  if (v > 1.0) return 'mid';
  return 'none';
}

function sortInventoryList(list) {
  const sorted = list.slice();
  switch (currentSort) {
    case 'power':
      sorted.sort((a, b) => {
        const pb = GameData.calculatePower(GameData.calculateInstanceStats(b));
        const pa = GameData.calculatePower(GameData.calculateInstanceStats(a));
        return pb - pa;
      });
      break;
    case 'rarity':
      sorted.sort((a, b) => {
        const rb = RARITY_RANK[GameData.getCharacterMaster(b.charId).rarity];
        const ra = RARITY_RANK[GameData.getCharacterMaster(a.charId).rarity];
        return rb - ra || b.level - a.level;
      });
      break;
    case 'level':
      sorted.sort((a, b) => b.level - a.level);
      break;
    case 'hp': case 'atk': case 'def': case 'spd':
      sorted.sort((a, b) => {
        const sb = GameData.calculateInstanceStats(b)[currentSort];
        const sa = GameData.calculateInstanceStats(a)[currentSort];
        return sb - sa;
      });
      break;
    default: // 'obtained'
      sorted.sort((a, b) => b.obtainedAt - a.obtainedAt);
  }
  return sorted;
}

function charIconHtml(master, size) {
  if (master.image) {
    return `<img src="${master.image}" alt="${master.name}" style="width:${size}px;height:${size}px;object-fit:contain;" onerror="this.replaceWith(Object.assign(document.createElement('span'),{style:'font-size:${size}px;',textContent:'${GameData.ELEM_ICONS[master.element]||'👑'}'}))">`;
  }
  return `<span style="font-size:${size}px;">${GameData.ELEM_ICONS[master.element]||'👑'}</span>`;
}

function renderInventory() {
  const el = document.getElementById('inventory-list');
  el.innerHTML = '';
  let list = inventory.slice();
  if (currentFilter !== 'all') {
    list = list.filter(inst => GameData.getCharacterMaster(inst.charId).element === currentFilter);
  }
  list = sortInventoryList(list);
  if (list.length === 0) {
    el.innerHTML = '<div id="empty-msg">所持キャラがいません<br>発掘して仲間を増やそう</div>';
    return;
  }
  list.forEach(inst => {
    const master = GameData.getCharacterMaster(inst.charId);
    const power = GameData.calculatePower(GameData.calculateInstanceStats(inst));
    const card = document.createElement('div');
    card.className = `inv-card rarity-${master.rarity}`;
    card.innerHTML = `
      ${inst.individuality.perfect ? '<span class="perfect-badge">★</span>' : ''}
      ${master.rarity === 'title' ? '<span class="crest-badge">👑</span>' : ''}
      <div class="elem">${charIconHtml(master, 32)}</div>
      <div class="name">${master.name}</div>
      <div class="rarity" style="color:${GameData.RARITY_COLOR[master.rarity]}">${GameData.RARITY_LABEL[master.rarity]}</div>
      <div class="lv">Lv${inst.level}</div>
      <div class="power">⚔${power.toLocaleString()}</div>
    `;
    card.addEventListener('click', () => openDetail(inst.uid));
    el.appendChild(card);
  });
}

function openDetail(uid) {
  selectedUid = uid;
  document.getElementById('inventory-view').classList.add('hide');
  document.getElementById('detail-view').classList.add('show');
  renderDetail();
}

function closeDetail() {
  selectedUid = null;
  document.getElementById('inventory-view').classList.remove('hide');
  document.getElementById('detail-view').classList.remove('show');
  renderInventory();
}

function renderDetail() {
  const inst = inventory.find(i => i.uid === selectedUid);
  if (!inst) { closeDetail(); return; }
  const master = GameData.getCharacterMaster(inst.charId);
  const stats = GameData.calculateInstanceStats(inst);
  const ind = inst.individuality;

  document.getElementById('d-name').textContent = master.name;
  const rarityBadge = document.getElementById('d-rarity');
  rarityBadge.textContent = GameData.RARITY_LABEL[master.rarity];
  rarityBadge.style.color = GameData.RARITY_COLOR[master.rarity];
  document.getElementById('d-motif').textContent = master.motif || '';

  document.getElementById('d-perfect').style.display = ind.perfect ? 'block' : 'none';

  const powerEl = document.getElementById('d-power');
  if (powerEl) powerEl.textContent = GameData.calculatePower(stats).toLocaleString();

  const finalEl = document.getElementById('d-final-stats');
  finalEl.innerHTML = ['hp', 'atk', 'def', 'spd'].map(k => `
    <div class="stat-box">
      <div class="label">${{hp:'HP',atk:'攻撃',def:'防御',spd:'素早さ'}[k]}</div>
      <div class="value">${stats[k]}</div>
    </div>
  `).join('');

  const indEl = document.getElementById('d-individuality');
  indEl.innerHTML = ['hp', 'atk', 'def', 'spd'].map(k => `
    <div class="stat-box">
      <div class="label">${{hp:'HP',atk:'攻撃',def:'防御',spd:'素早さ'}[k]}</div>
      <div class="mul ${statMulClass(ind[k])}">×${ind[k].toFixed(1)}</div>
    </div>
  `).join('');

  document.getElementById('d-rarity-mul').textContent = `×${GameData.RARITY_MUL[master.rarity].toFixed(2)}`;
  document.getElementById('d-dig-grade').textContent = `${inst.digGrade}評価（×${GameData.DIG_GRADE_MUL[inst.digGrade].toFixed(2)}）`;
  document.getElementById('d-base').textContent = `HP${master.baseStats.hp} 攻${master.baseStats.atk} 防${master.baseStats.def} 速${master.baseStats.spd}`;

  document.getElementById('d-level').textContent = inst.level;
  const awakenCount = inst.awakenCount || 0;
  const cost = GameData.goldToNextLevel(inst.level, awakenCount);
  const costLabel = document.getElementById('d-cost-label');
  const btn = document.getElementById('btn-strengthen');
  if (cost === null) {
    costLabel.textContent = `Lv上限（${GameData.getMaxLevelCap(awakenCount)}）`;
    btn.disabled = true;
    btn.textContent = awakenCount >= GameData.AWAKEN_MAX_COUNT ? 'レベル上限' : '覚醒待ち';
  } else {
    costLabel.innerHTML = `次のLvまで：<span>${cost}G</span>`;
    btn.disabled = GameData.getGold() < cost;
    btn.textContent = `強化する（${cost}G）`;
  }
  document.getElementById('strengthen-msg').textContent = '';

  renderAwakenBox(inst, master, awakenCount);
}

function renderAwakenBox(inst, master, awakenCount) {
  document.getElementById('d-awaken-count').textContent = awakenCount;
  const materialKey = master.element || 'title';
  const materialHave = GameData.getAwakenMaterialCount(materialKey);
  const elemLabel = GameData.ELEM_ICONS[master.element] || '👑';
  document.getElementById('d-awaken-material-have').innerHTML =
    `覚醒石${elemLabel}：<span>${materialHave}個</span>`;

  const reqEl = document.getElementById('d-awaken-req');
  const btnAwaken = document.getElementById('btn-awaken');

  if (awakenCount >= GameData.AWAKEN_MAX_COUNT) {
    reqEl.innerHTML = '覚醒MAX（+' + Math.round(GameData.getAwakenBonus(awakenCount) * 100) + '%）';
    btnAwaken.disabled = true;
    btnAwaken.textContent = '覚醒MAX';
    return;
  }

  const requiredLevel = GameData.getMaxLevelCap(awakenCount);
  const req = GameData.getAwakenRequirement(awakenCount + 1);
  const levelOk = inst.level >= requiredLevel;
  const goldOk = GameData.getGold() >= req.gold;
  const materialOk = materialHave >= req.material;

  reqEl.innerHTML = `
    条件：<span class="${levelOk ? 'ok' : 'ng'}">Lv${requiredLevel}到達</span>
    ／<span class="${goldOk ? 'ok' : 'ng'}">${req.gold}G</span>
    ／<span class="${materialOk ? 'ok' : 'ng'}">覚醒石${elemLabel}×${req.material}</span>
    ／効果：+${Math.round(GameData.AWAKEN_STAT_BONUS * 100)}%・Lv上限${requiredLevel}→${requiredLevel + 10}
  `;
  btnAwaken.disabled = !(levelOk && goldOk && materialOk);
  btnAwaken.textContent = `覚醒する（${req.gold}G・覚醒石×${req.material}）`;
}

document.getElementById('back-btn').addEventListener('click', closeDetail);

document.getElementById('btn-strengthen').addEventListener('click', () => {
  const result = GameData.strengthenInstance(selectedUid);
  const msg = document.getElementById('strengthen-msg');
  if (result.ok) {
    msg.style.color = '#a0e880';
    msg.textContent = `Lv${result.newLevel}に強化！ ${result.spentGold}G消費`;
    inventory = GameData.loadInventory();
    refreshGold();
    renderDetail();
  } else if (result.reason === 'not_enough_gold') {
    msg.style.color = '#ff8866';
    msg.textContent = 'ゴールドが足りません';
  } else if (result.reason === 'max_level') {
    msg.style.color = '#8a7c64';
    msg.textContent = 'すでに現在のレベル上限です（覚醒が必要）';
  }
});

document.getElementById('btn-awaken').addEventListener('click', () => {
  const result = GameData.awakenInstance(selectedUid);
  const msg = document.getElementById('awaken-msg');
  if (result.ok) {
    msg.style.color = '#c896ff';
    msg.textContent = `覚醒${result.newAwakenCount}段階目！ Lv上限${result.newLevelCap}に拡張（${result.spentGold}G・素材${result.spentMaterial}個消費）`;
    inventory = GameData.loadInventory();
    refreshGold();
    renderDetail();
  } else if (result.reason === 'level_not_maxed') {
    msg.style.color = '#ff8866';
    msg.textContent = `Lv${result.requiredLevel}まで強化してから覚醒できます`;
  } else if (result.reason === 'not_enough_gold') {
    msg.style.color = '#ff8866';
    msg.textContent = 'ゴールドが足りません';
  } else if (result.reason === 'not_enough_material') {
    msg.style.color = '#ff8866';
    msg.textContent = `覚醒石が足りません（${result.have}/${result.need}）`;
  } else if (result.reason === 'max_awaken') {
    msg.style.color = '#8a7c64';
    msg.textContent = 'すでに覚醒MAXです';
  }
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentFilter = btn.dataset.filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderInventory();
  });
});

document.getElementById('sort-select').addEventListener('change', (e) => {
  currentSort = e.target.value;
  renderInventory();
});

refreshGold();
renderInventory();
</script>
</body>
</html>
