<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>カセキハンター</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }

  body {
    background: #f0ece4;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }

  #game-wrapper {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  #title {
    color: #a87a1e;
    font-size: 22px;
    font-weight: bold;
    letter-spacing: 4px;
    text-shadow: none;
  }

  #hud {
    display: flex;
    gap: 20px;
    align-items: center;
    width: 100%;
    justify-content: space-between;
    padding: 0 4px;
  }

  .hud-item {
    color: #5c5248;
    font-size: 13px;
    letter-spacing: 1px;
  }

  .hud-item span {
    color: #8a5a10;
    font-weight: bold;
    font-size: 16px;
  }

  #canvas-container {
    position: relative;
    border: 3px solid #5a3e28;
    border-radius: 4px;
    box-shadow: 0 0 30px #00000088, inset 0 0 20px #00000044;
  }

  #bg-canvas { position: absolute; top: 0; left: 0; }
  #fossil-canvas { position: absolute; top: 0; left: 0; }
  #dig-canvas { position: absolute; top: 0; left: 0; cursor: crosshair; }
  #particle-canvas { position: absolute; top: 0; left: 0; pointer-events: none; }

  #tool-bar {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .tool-btn {
    background: #4a423a;
    border: 2px solid #7a6d5e;
    border-radius: 6px;
    color: #c8b89a;
    padding: 8px 16px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 1px;
  }

  .tool-btn.active {
    background: #5a3e28;
    border-color: #d4a843;
    color: #f0d080;
    box-shadow: 0 0 10px #d4a84366;
  }

  .tool-btn:hover { border-color: #d4a843; }

  #result-screen {
    display: none;
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #0a0604ee;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    border-radius: 2px;
  }

  #result-screen.show { display: flex; }

  #result-title {
    color: #d4a843;
    font-size: 28px;
    font-weight: bold;
    text-shadow: 0 0 20px #d4a843;
    letter-spacing: 3px;
  }

  #fossil-rarity {
    font-size: 13px;
    font-weight: bold;
    letter-spacing: 3px;
    padding: 3px 14px;
    border-radius: 12px;
    border: 1px solid currentColor;
  }

  #fossil-name {
    color: #f0d080;
    font-size: 20px;
    letter-spacing: 2px;
  }

  #result-score {
    color: #c8b89a;
    font-size: 15px;
  }

  #result-grade {
    font-size: 48px;
    text-shadow: 0 0 30px currentColor;
  }

  #next-btn {
    background: #5a3e28;
    border: 2px solid #d4a843;
    border-radius: 6px;
    color: #f0d080;
    padding: 10px 28px;
    font-size: 15px;
    cursor: pointer;
    letter-spacing: 2px;
    margin-top: 8px;
    transition: all 0.15s;
  }

  #next-btn:hover { background: #7a5538; box-shadow: 0 0 15px #d4a84366; }

  #damage-flash {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(255,60,60,0);
    pointer-events: none;
    transition: background 0.1s;
    border-radius: 2px;
  }

  #warning-bar {
    height: 14px;
    width: 100%;
    background: #d8d0c0;
    border-radius: 6px;
    border: 2px solid #3a2518;
    overflow: hidden;
    position: relative;
  }

  #warning-fill {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, #2ecc71, #f1c40f, #e74c3c);
    transition: width 0.2s;
    transform-origin: right;
  }

  #warning-label {
    position: absolute;
    right: 6px;
    top: 50%;
    transform: translateY(-50%);
    color: #fff;
    font-size: 9px;
    letter-spacing: 1px;
    mix-blend-mode: difference;
  }
</style>
</head>
<body>

<div id="game-wrapper">
  <div id="title">⛏ カセキハンター ⛏</div>

  <div id="hud">
    <div class="hud-item">🪨 <span id="rock-count">0</span></div>
    <div class="hud-item">化石：<span id="fossil-label">???</span></div>
    <div class="hud-item">⏱ <span id="time-left">90</span>s</div>
    <div class="hud-item">露出：<span id="expose-pct">0</span>%</div>
    <div class="hud-item">HP：<span id="hp-val">100</span></div>
  </div>

  <div id="warning-bar">
    <div id="warning-fill"></div>
    <div id="warning-label">化石ダメージ</div>
  </div>

  <div id="canvas-container">
    <canvas id="bg-canvas"></canvas>
    <canvas id="fossil-canvas"></canvas>
    <canvas id="dig-canvas"></canvas>
    <canvas id="particle-canvas"></canvas>
    <div id="damage-flash"></div>
    <div id="result-screen">

      <div id="fossil-name"></div>
      <div id="result-grade"></div>
      <div id="result-score"></div>
      <button id="next-btn">つぎの化石へ ▶</button>
      <div style="display:flex; gap:8px; margin-top:4px;">
        <a href="title.html" style="color:#c8b89a; font-size:12px; text-decoration:underline;">タイトルへ</a>
        <a href="formation.html" style="color:#c8b89a; font-size:12px; text-decoration:underline;">編成へ</a>
      </div>
    </div>
  </div>

  <div id="tool-bar">
    <button class="tool-btn active" data-tool="hammer">🔨 ハンマー</button>
    <button class="tool-btn" data-tool="drill">🔩 ドリル</button>
  </div>
</div>

  function getCharacterMaster(id) {
    return CHARACTER_MASTER.find((c) => c.id === id) || null;
  }

  // ============================================================
  // セーブデータ（localStorage）
  // ============================================================
  const STORAGE_KEYS = {
    inventory: 'kaseki_inventory',   // 所持キャラ一覧（発掘で獲得した個体）
    gold: 'kaseki_gold',
    party: 'kaseki_party',           // 編成中のuid配列（最大3）
    stones: 'kaseki_rocks',          // 「岩」の所持数
    awakenMaterials: 'kaseki_awaken_materials', // 覚醒石の所持数（属性ごと）
    playerLevel: 'kaseki_player_level',
    playerExp: 'kaseki_player_exp',
    stamina: 'kaseki_stamina',
    staminaTs: 'kaseki_stamina_ts',  // 最後にスタミナを計算した時刻(ms)
  };

  function loadInventory() {
    try {
      const raw = localStorage.getItem(STORAGE_KEYS.inventory);
      return raw ? JSON.parse(raw) : [];
    } catch (e) {
      return [];
    }
  }

  function saveInventory(list) {
    localStorage.setItem(STORAGE_KEYS.inventory, JSON.stringify(list));
  }

  /**
   * 発掘完了時に呼ぶ：新しいキャラ個体をインベントリに追加する
   * @param {string} charId - CHARACTER_MASTERのid
   * @param {string} digGrade - 'S'|'A'|'B'|'C'|'D'
   * @returns {object} 追加された個体データ
   */
  function addCharacterToInventory(charId, digGrade) {
    const master = getCharacterMaster(charId);
    if (!master) throw new Error('Unknown character id: ' + charId);
    const individuality = rollIndividuality();
    const instance = {
      uid: 'inst_' + Date.now() + '_' + Math.floor(Math.random() * 100000),
      charId,
      digGrade,
      individuality,
      level: 1,
      obtainedAt: Date.now(),
    };
    const inv = loadInventory();
    inv.push(instance);
    saveInventory(inv);
    return instance;
  }

  /**
   * 強化倍率（16章改訂版）：レベル帯ごとに伸び率が加速するバンド制
   * Lv1〜50は強化のみで到達可能（約×3.0）。Lv51以降は覚醒で上限を+10ずつ解放しないと入れない領域で、
   * 伸び率はLv41〜50と同じ+6%/Lvを維持（これ以上は加速させず、覚醒側のボーナスで伸ばす設計）
   */
  const STRENGTHEN_BANDS = [
    { from: 2,   to: 10,  rate: 0.02 }, // Lv2〜10：+2%/Lv（+18%）
    { from: 11,  to: 20,  rate: 0.03 }, // Lv11〜20：+3%/Lv（+30%）
    { from: 21,  to: 30,  rate: 0.04 }, // Lv21〜30：+4%/Lv（+40%）
    { from: 31,  to: 40,  rate: 0.05 }, // Lv31〜40：+5%/Lv（+50%）
    { from: 41,  to: 50,  rate: 0.06 }, // Lv41〜50：+6%/Lv（+60%）※強化単体の上限はここ
    { from: 51,  to: 60,  rate: 0.06 }, // 覚醒1後：+6%/Lv（+60%）
    { from: 61,  to: 70,  rate: 0.06 }, // 覚醒2後：+6%/Lv（+60%）
    { from: 71,  to: 80,  rate: 0.06 }, // 覚醒3後：+6%/Lv（+60%）
    { from: 81,  to: 90,  rate: 0.06 }, // 覚醒4後：+6%/Lv（+60%）
    { from: 91,  to: 100, rate: 0.06 }, // 覚醒5後：+6%/Lv（+60%）
  ];
  function getStrengthenBandBonus(lv) {
    let bonus = 0;
    for (const band of STRENGTHEN_BANDS) {
      if (lv < band.from) break;
      const upper = Math.min(lv, band.to);
      bonus += (upper - band.from + 1) * band.rate;
    }
    return bonus; // Lv50で+1.98(≒×3)、Lv100(覚醒5込み)で+4.98(≒×6)
  }

  // --- 覚醒 ---
  // 覚醒1回につきステータス+25%（強化ボーナスとは同じ枠で加算＝掛け算の暴走を防ぐ設計）
  const AWAKEN_STAT_BONUS = 0.25;
  const AWAKEN_MAX_COUNT = 5;
  const BASE_LEVEL_CAP = 50;
  function getMaxLevelCap(awakenCount) {
    return Math.min(100, BASE_LEVEL_CAP + (awakenCount || 0) * 10);
  }
  function getAwakenBonus(awakenCount) {
    return (awakenCount || 0) * AWAKEN_STAT_BONUS; // 5回で+125%
  }
  // 覚醒に必要なゴールド・専用素材（素材は対象キャラの属性の「覚醒石」、ダンジョン産）
  // 段階が上がるほどゴールド・素材ともに要求量が増える
  const AWAKEN_REQUIREMENTS = [
    { gold: 5000,  material: 3 },  // 1覚醒目：Lv50到達が条件
    { gold: 12000, material: 5 },  // 2覚醒目：Lv60到達が条件
    { gold: 25000, material: 8 },  // 3覚醒目：Lv70到達が条件
    { gold: 45000, material: 12 }, // 4覚醒目：Lv80到達が条件
    { gold: 75000, material: 18 }, // 5覚醒目：Lv90到達が条件
  ];
  function getAwakenRequirement(nextAwakenCount) {
    return AWAKEN_REQUIREMENTS[nextAwakenCount - 1] || null;
  }
  // レベル帯が上がる（＝覚醒で解放した領域に入る）ほど1レベルあたりのゴールドコストも増加
  const STRENGTHEN_COST_TIER_MUL = [1, 1.5, 2.0, 2.5, 3.0, 3.5]; // [Lv1-50, 51-60, 61-70, 71-80, 81-90, 91-100]
  function getStrengthenCostTierMul(lv) {
    if (lv <= 50) return STRENGTHEN_COST_TIER_MUL[0];
    const tier = Math.min(5, Math.ceil((lv - 50) / 10));
    return STRENGTHEN_COST_TIER_MUL[tier];
  }

  /**
   * 所持個体の最終ステータスを計算する
   * 最終ステータス = 基礎値 × レアリティ補正 × 個体差倍率 × 発掘評価補正 × (1 + 強化ボーナス + 覚醒ボーナス)
   * @param {object} instance - loadInventory()の要素
   * @param {number} [titleDungeonDifficulty] - 称号ダンジョン挑戦時のみ、HPに難易度倍率をかける
   */
  function calculateInstanceStats(instance, titleDungeonDifficulty) {
    const master = getCharacterMaster(instance.charId);
    if (!master) return null;
    const rarityMul = RARITY_MUL[master.rarity] || 1.0;
    const digMul = DIG_GRADE_MUL[instance.digGrade] || 1.0;
    const ind = instance.individuality || { hp: 1, atk: 1, def: 1, spd: 1 };
    const lv = instance.level || 1;
    const awakenCount = instance.awakenCount || 0;
    const strengthenMul = 1 + getStrengthenBandBonus(lv) + getAwakenBonus(awakenCount);
    const hpDiffMul = master.rarity === 'title' && titleDungeonDifficulty
      ? (TITLE_DUNGEON_HP_MUL[titleDungeonDifficulty] || 1)
      : 1;
    const b = master.baseStats;
    return {
      hp: Math.round(b.hp * rarityMul * ind.hp * digMul * strengthenMul * hpDiffMul),
      atk: Math.round(b.atk * rarityMul * ind.atk * digMul * strengthenMul),
      def: Math.round(b.def * rarityMul * ind.def * digMul * strengthenMul),
      spd: Math.round(b.spd * rarityMul * ind.spd * digMul * strengthenMul),
      sp: Math.round((b.sp || 100) * rarityMul), // 最大SPはキャラごとの基礎値×レアリティ補正（個体差・強化は影響しない）
    };
  }

  // --- ゴールド ---
  function getGold() {
    return parseInt(localStorage.getItem(STORAGE_KEYS.gold) || '500', 10);
  }
  function setGold(v) {
    localStorage.setItem(STORAGE_KEYS.gold, String(Math.max(0, Math.round(v))));
  }
  function addGold(delta) {
    setGold(getGold() + delta);
  }

  // --- プレイヤーレベル（スタミナ上限に影響、Lv100が上限） ---
  const PLAYER_LEVEL_CAP = 100;
  const STAMINA_START = 20;   // 初期スタミナ上限（プレイヤーLv1時点）
  const STAMINA_MAX_CAP = 300; // スタミナ上限の絶対最大値（Lv100到達で到達）
  const STAMINA_PER_LEVEL = (STAMINA_MAX_CAP - STAMINA_START) / (PLAYER_LEVEL_CAP - 1); // Lv1→100で20→300になるよう均等割り（約2.83/Lv）
  const STAMINA_REGEN_MS = 5 * 60 * 1000; // 5分で1回復
  const PLAYER_EXP_PER_LEVEL = 50; // Lvごとに必要EXPが+50ずつ増える(Lv1→2は50, Lv2→3は100…)

  function getPlayerLevel() {
    return parseInt(localStorage.getItem(STORAGE_KEYS.playerLevel) || '1', 10);
  }
  function getPlayerExp() {
    return parseInt(localStorage.getItem(STORAGE_KEYS.playerExp) || '0', 10);
  }
  function getExpToNextLevel(level) {
    return level * PLAYER_EXP_PER_LEVEL;
  }
  function getMaxStamina(level) {
    const lv = Math.min(PLAYER_LEVEL_CAP, level || getPlayerLevel());
    return Math.round(Math.min(STAMINA_MAX_CAP, STAMINA_START + (lv - 1) * STAMINA_PER_LEVEL));
  }
  // プレイヤーEXPを加算し、必要ならレベルアップさせる（複数レベル分一気に上がるケースも考慮。Lv100でカンスト）
  function addPlayerExp(amount) {
    let level = getPlayerLevel();
    if (level >= PLAYER_LEVEL_CAP) {
      return { level: PLAYER_LEVEL_CAP, exp: 0, leveledUp: false }; // カンスト済みはEXPを受け取らない
    }
    let exp = getPlayerExp() + amount;
    let leveledUp = false;
    let stamBonus = 0; // レベルアップごとの「そのレベルのMAX値」を丸ごと積み上げる
    while (level < PLAYER_LEVEL_CAP && exp >= getExpToNextLevel(level)) {
      exp -= getExpToNextLevel(level);
      level += 1;
      leveledUp = true;
      stamBonus += getMaxStamina(level); // 差分ではなく、そのレベル時点のMAX値をまるごと加算
    }
    if (level >= PLAYER_LEVEL_CAP) {
      level = PLAYER_LEVEL_CAP;
      exp = 0; // カンスト到達時は端数EXPを切り捨てて0にする
    }
    localStorage.setItem(STORAGE_KEYS.playerLevel, String(level));
    localStorage.setItem(STORAGE_KEYS.playerExp, String(exp));
    if (leveledUp) {
      // 残っていたスタミナ＋新MAX値をそのまま加算（上限を超えるオーバーフローも許容する）
      const stam = getStamina();
      setStaminaRaw(stam + stamBonus);
    }
    return { level, exp, leveledUp };
  }

  // --- スタミナ ---
  function setStaminaRaw(v) {
    localStorage.setItem(STORAGE_KEYS.stamina, String(Math.max(0, Math.round(v))));
    localStorage.setItem(STORAGE_KEYS.staminaTs, String(Date.now()));
  }
  // 経過時間分のスタミナ自然回復を計算してから現在値を返す
  // ※レベルアップ直後などで上限を超えている場合はそのオーバーフローをそのまま維持する（自然減少で消費されるまで残る）
  function getStamina() {
    const max = getMaxStamina();
    const rawStam = localStorage.getItem(STORAGE_KEYS.stamina);
    const rawTs = localStorage.getItem(STORAGE_KEYS.staminaTs);
    if (rawStam === null || rawTs === null) {
      setStaminaRaw(STAMINA_START);
      return STAMINA_START;
    }
    let stam = parseInt(rawStam, 10);
    const ts = parseInt(rawTs, 10);
    if (stam >= max) {
      return stam; // 上限以上ならそのまま返す（減算するまでオーバーフローを保持）
    }
    const elapsedMs = Date.now() - ts;
    const regen = Math.floor(elapsedMs / STAMINA_REGEN_MS);
    if (regen > 0) {
      stam = Math.min(max, stam + regen);
      const remainderTs = ts + regen * STAMINA_REGEN_MS;
      localStorage.setItem(STORAGE_KEYS.stamina, String(stam));
      localStorage.setItem(STORAGE_KEYS.staminaTs, String(remainderTs));
    }
    return stam;
  }
  function getMsToNextStamina() {
    const max = getMaxStamina();
    const stam = getStamina();
    if (stam >= max) return 0;
    const ts = parseInt(localStorage.getItem(STORAGE_KEYS.staminaTs) || String(Date.now()), 10);
    return Math.max(0, STAMINA_REGEN_MS - (Date.now() - ts));
  }
  function hasEnoughStamina(cost) {
    return getStamina() >= cost;
  }
  // スタミナを消費する。足りなければ何もせずfalseを返す
  function consumeStamina(cost) {
    const cur = getStamina();
    if (cur < cost) return false;
    setStaminaRaw(cur - cost);
    return true;
  }

  // --- 覚醒素材（属性ごとの「覚醒石」。ダンジョン産／今はまだダンジョン未実装なので付与手段は今後追加） ---
  function getAwakenMaterials() {
    try {
      const raw = localStorage.getItem(STORAGE_KEYS.awakenMaterials);
      return raw ? JSON.parse(raw) : {};
    } catch (e) {
      return {};
    }
  }
  function getAwakenMaterialCount(element) {
    return getAwakenMaterials()[element] || 0;
  }
  function addAwakenMaterial(element, delta) {
    const m = getAwakenMaterials();
    m[element] = Math.max(0, (m[element] || 0) + delta);
    localStorage.setItem(STORAGE_KEYS.awakenMaterials, JSON.stringify(m));
    return m[element];
  }

  // --- 強化 ---
  function goldToNextLevel(currentLevel, awakenCount) {
    const cap = getMaxLevelCap(awakenCount || 0);
    if (currentLevel >= cap) return null;
    return Math.round(currentLevel * 100 * getStrengthenCostTierMul(currentLevel)); // Lv×100G×帯倍率
  }
  function strengthenInstance(uid) {
    const inv = loadInventory();
    const inst = inv.find((i) => i.uid === uid);
    if (!inst) return { ok: false, reason: 'not_found' };
    const cost = goldToNextLevel(inst.level, inst.awakenCount || 0);
    if (cost === null) return { ok: false, reason: 'max_level' };
    if (getGold() < cost) return { ok: false, reason: 'not_enough_gold' };
    addGold(-cost);
    inst.level += 1;
    saveInventory(inv);
    return { ok: true, newLevel: inst.level, spentGold: cost };
  }

  /**
   * 覚醒を実行する。条件：現在の覚醒段階の上限レベルまで強化済み、かつゴールド・専用素材が足りていること
   */
  function awakenInstance(uid) {
    const inv = loadInventory();
    const inst = inv.find((i) => i.uid === uid);
    if (!inst) return { ok: false, reason: 'not_found' };
    const master = getCharacterMaster(inst.charId);
    if (!master) return { ok: false, reason: 'not_found' };
    const cur = inst.awakenCount || 0;
    if (cur >= AWAKEN_MAX_COUNT) return { ok: false, reason: 'max_awaken' };
    const requiredLevel = getMaxLevelCap(cur);
    if ((inst.level || 1) < requiredLevel) {
      return { ok: false, reason: 'level_not_maxed', requiredLevel };
    }
    const req = getAwakenRequirement(cur + 1);
    if (!req) return { ok: false, reason: 'no_requirement_data' };
    if (getGold() < req.gold) return { ok: false, reason: 'not_enough_gold', need: req.gold };
    const haveMaterial = getAwakenMaterialCount(master.element);
    if (haveMaterial < req.material) {
      return { ok: false, reason: 'not_enough_material', need: req.material, have: haveMaterial, element: master.element };
    }
    addGold(-req.gold);
    addAwakenMaterial(master.element, -req.material);
    inst.awakenCount = cur + 1;
    saveInventory(inv);
    return {
      ok: true,
      newAwakenCount: inst.awakenCount,
      newLevelCap: getMaxLevelCap(inst.awakenCount),
      spentGold: req.gold,
      spentMaterial: req.material,
    };
  }

  // --- 「岩」 ---
  function getRockCount() {
    return parseInt(localStorage.getItem(STORAGE_KEYS.stones) || '3', 10);
  }
  function setRockCount(v) {
    localStorage.setItem(STORAGE_KEYS.stones, String(Math.max(0, Math.round(v))));
  }
  function addRocks(delta) {
    setRockCount(getRockCount() + delta);
  }
  function useRock() {
    const cur = getRockCount();
    if (cur <= 0) return false;
    setRockCount(cur - 1);
    return true;
  }

  // --- 編成（パーティ） ---
  function loadParty() {
    try {
      const raw = localStorage.getItem(STORAGE_KEYS.party);
      return raw ? JSON.parse(raw) : [];
    } catch (e) {
      return [];
    }
  }
  function saveParty(uids) {
    localStorage.setItem(STORAGE_KEYS.party, JSON.stringify(uids.slice(0, 6)));
  }

  /**
   * 編成中パーティを auto-battle.html が使える戦闘用データ形式に変換
   */
  function getPartyAsFighterDefs() {
    const inv = loadInventory();
    const party = loadParty();
    const defs = party
      .map((uid) => inv.find((i) => i.uid === uid))
      .filter(Boolean)
      .map((inst) => {
        const master = getCharacterMaster(inst.charId);
        const stats = calculateInstanceStats(inst);
        return {
          uid: inst.uid,
          name: master.name,
          element: master.element,
          rarity: master.rarity,
          level: inst.level,
          skills: master.skills,
          stats, // { hp, atk, def, spd } 計算済み
        };
      });
    return defs;
  }

  // ============================================================
  // ダメージ計算（10章のダメージ計算式）
  // ============================================================
  function calculateDamage(power, atk, def, atkElement, defElement, targetMul) {
    const eff = getTypeMultiplier(atkElement, defElement);
    const rng = 0.85 + Math.random() * 0.15;
    const raw = power * (targetMul || 1.0) * (atk / def) * eff * rng;
    return { dmg: Math.max(1, Math.round(raw)), eff };
  }

  // ============================================================
  // 発掘用：発掘ミニゲームが使うFOSSILS形式へ変換するヘルパー
  // ============================================================
  function getNormalCharacterList() {
    // TITLE(称号)キャラは通常発掘の対象外
    return CHARACTER_MASTER.filter((c) => c.rarity !== 'title');
  }

  // ============================================================
  // 公開API
  // ============================================================
  const GameData = {
    // 定数
    TYPE_CHART, ELEM_ICONS, ELEM_COLORS, ELEM_LABEL,
    RARITY_MUL, RARITY_LABEL, RARITY_COLOR, DIG_GRADE_MUL,
    TIER_POWER, TIER_MULTIPLIER, POWER_BASE, TARGET_COUNT_MULTIPLIER, TITLE_DUNGEON_HP_MUL,
    BASE_LEVEL_CAP, AWAKEN_MAX_COUNT, AWAKEN_STAT_BONUS, AWAKEN_REQUIREMENTS,
    CHARACTER_MASTER,

    // ロジック
    getTypeMultiplier,
    getTargetMultiplier,
    rollIndividuality,
    calculateDamage,
    getCharacterMaster,
    getNormalCharacterList,
    calculateInstanceStats,
    getStrengthenBandBonus,
    getMaxLevelCap,
    getAwakenBonus,
    getAwakenRequirement,
    getStrengthenCostTierMul,

    // セーブデータ
    loadInventory,
    saveInventory,
    addCharacterToInventory,
    getGold,
    setGold,
    addGold,
    goldToNextLevel,
    strengthenInstance,
    awakenInstance,
    getAwakenMaterials,
    getAwakenMaterialCount,
    addAwakenMaterial,
    getRockCount,
    setRockCount,
    addRocks,
    useRock,
    loadParty,
    saveParty,
    getPartyAsFighterDefs,
    // プレイヤーレベル・スタミナ
    STAMINA_START, STAMINA_MAX_CAP, STAMINA_PER_LEVEL, STAMINA_REGEN_MS, PLAYER_LEVEL_CAP,
    getPlayerLevel,
    getPlayerExp,
    getExpToNextLevel,
    addPlayerExp,
    getMaxStamina,
    getStamina,
    getMsToNextStamina,
    hasEnoughStamina,
    consumeStamina,
  };

  if (typeof module !== 'undefined' && module.exports) {
    module.exports = GameData;
  } else {
    global.GameData = GameData;
  }
})(typeof window !== 'undefined' ? window : globalThis);

<script>
// ======== CONFIG ========
const CW = Math.min(window.innerWidth - 20, 380);
const CH = Math.min(window.innerHeight - 220, 480);
const CELL = 4; // dirt pixel size
const COLS = Math.floor(CW / CELL);
const ROWS = Math.floor(CH / CELL);

// Fossil definitions
// レアリティ表示ラベルと色（game-data.jsのRARITY_LABEL/RARITY_COLORと統一）
const RARITY_LABELS = {
  common: { label: 'COMMON', color: '#e8e4da', glow: '#a8a090' },
  rare:   { label: 'RARE',   color: '#4dc8ff', glow: '#1e8fcc' },
  epic:   { label: 'EPIC',   color: '#b478ff', glow: '#7c3fcc' },
};

// 5属性の定義（タイプ相性：風→土→雷→水→火→風 のループ、矢印の元が先に強い）
const ELEMENT_TYPES = {
  fire:    { label: '火', strongAgainst: 'wind',    weakAgainst: 'water'   },
  water:   { label: '水', strongAgainst: 'fire',    weakAgainst: 'thunder' },
  earth:   { label: '土', strongAgainst: 'thunder', weakAgainst: 'wind'    },
  thunder: { label: '雷', strongAgainst: 'water',   weakAgainst: 'earth'   },
  wind:    { label: '風', strongAgainst: 'earth',   weakAgainst: 'fire'    },
};

// ======== 紋章タイプ定義（形はタイプ共通、色はレアリティで変化） ========
const EMBLEM_TYPES = {
  fire: {
    typeLabel: '火',
    draw(ctx, cx, cy, color) {
      ctx.strokeStyle = color;
      ctx.lineWidth = 4;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      // 揺らめく炎の外側シルエット
      ctx.beginPath();
      ctx.moveTo(cx, cy + 46);
      ctx.bezierCurveTo(cx + 26, cy + 38, cx + 30, cy + 16, cx + 20, cy - 2);
      ctx.bezierCurveTo(cx + 30, cy - 10, cx + 18, cy - 30, cx + 4, cy - 50);
      ctx.bezierCurveTo(cx + 6, cy - 32, cx - 4, cy - 28, cx - 6, cy - 14);
      ctx.bezierCurveTo(cx - 16, cy - 22, cx - 24, cy - 10, cx - 20, cy + 4);
      ctx.bezierCurveTo(cx - 28, cy + 2, cx - 28, cy + 20, cx - 14, cy + 30);
      ctx.bezierCurveTo(cx - 18, cy + 34, cx - 10, cy + 42, cx, cy + 46);
      ctx.closePath();
      ctx.stroke();
      // 内側の小さい炎の芯
      ctx.beginPath();
      ctx.moveTo(cx, cy + 26);
      ctx.bezierCurveTo(cx + 12, cy + 18, cx + 12, cy + 2, cx + 4, cy - 10);
      ctx.bezierCurveTo(cx + 8, cy - 18, cx + 2, cy - 26, cx - 4, cy - 32);
      ctx.bezierCurveTo(cx - 6, cy - 20, cx - 12, cy - 12, cx - 8, cy);
      ctx.bezierCurveTo(cx - 14, cy + 6, cx - 12, cy + 18, cx, cy + 26);
      ctx.closePath();
      ctx.stroke();
    }
  },
  water: {
    typeLabel: '水',
    draw(ctx, cx, cy, color) {
      ctx.strokeStyle = color;
      ctx.lineWidth = 4;
      ctx.lineCap = 'round';
      // しずく形状
      ctx.beginPath();
      ctx.moveTo(cx, cy - 45);
      ctx.bezierCurveTo(cx + 30, cy - 5, cx + 25, cy + 35, cx, cy + 40);
      ctx.bezierCurveTo(cx - 25, cy + 35, cx - 30, cy - 5, cx, cy - 45);
      ctx.stroke();
      // 同心円の波紋
      ctx.beginPath();
      ctx.arc(cx, cy + 10, 12, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(cx, cy + 10, 22, 0.3, Math.PI - 0.3);
      ctx.stroke();
    }
  },
  earth: {
    typeLabel: '土',
    draw(ctx, cx, cy, color) {
      ctx.strokeStyle = color;
      ctx.lineWidth = 4;
      ctx.lineJoin = 'round';
      // 六角形の結晶（外側）
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const angle = (i / 6) * Math.PI * 2 - Math.PI / 2;
        const px = cx + Math.cos(angle) * 40;
        const py = cy + Math.sin(angle) * 40;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.stroke();
      // 内側の小さい六角形
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const angle = (i / 6) * Math.PI * 2 - Math.PI / 2;
        const px = cx + Math.cos(angle) * 20;
        const py = cy + Math.sin(angle) * 20;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.stroke();
      // 接続線
      for (let i = 0; i < 6; i++) {
        const angle = (i / 6) * Math.PI * 2 - Math.PI / 2;
        ctx.beginPath();
        ctx.moveTo(cx + Math.cos(angle) * 20, cy + Math.sin(angle) * 20);
        ctx.lineTo(cx + Math.cos(angle) * 40, cy + Math.sin(angle) * 40);
        ctx.stroke();
      }
    }
  },
  thunder: {
    typeLabel: '雷',
    draw(ctx, cx, cy, color) {
      ctx.strokeStyle = color;
      ctx.lineWidth = 5;
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      // 上向きの稲妻
      ctx.beginPath();
      ctx.moveTo(cx + 6, cy - 48);
      ctx.lineTo(cx - 12, cy - 8);
      ctx.lineTo(cx, cy - 8);
      ctx.lineTo(cx - 6, cy + 4);
      ctx.lineTo(cx + 10, cy - 20);
      ctx.lineTo(cx - 2, cy - 20);
      ctx.closePath();
      ctx.stroke();
      // 下向きの稲妻（点対称）
      ctx.beginPath();
      ctx.moveTo(cx - 6, cy + 48);
      ctx.lineTo(cx + 12, cy + 8);
      ctx.lineTo(cx, cy + 8);
      ctx.lineTo(cx + 6, cy - 4);
      ctx.lineTo(cx - 10, cy + 20);
      ctx.lineTo(cx + 2, cy + 20);
      ctx.closePath();
      ctx.stroke();
    }
  },
  wind: {
    typeLabel: '風',
    draw(ctx, cx, cy, color) {
      ctx.strokeStyle = color;
      ctx.lineWidth = 4;
      ctx.lineCap = 'round';
      // 渦巻く風の流れ（3本のスパイラル）
      for (let i = 0; i < 3; i++) {
        const offset = (i / 3) * Math.PI * 2;
        ctx.beginPath();
        for (let t = 0; t <= 1; t += 0.02) {
          const angle = offset + t * Math.PI * 2.2;
          const radius = t * 42;
          const px = cx + Math.cos(angle) * radius;
          const py = cy + Math.sin(angle) * radius;
          if (t === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        }
        ctx.stroke();
      }
    }
  },
};

// ======== 20体のキャラ定義（5属性×4体） ========
// game-data.js の CHARACTER_MASTER（新仕様の最終ステータス・技構成）をそのまま参照する。
// 発掘対象はTITLE(称号)キャラを除いた通常20体のみ。
const CHARACTER_ROSTER = GameData.getNormalCharacterList();

// CHARACTER_ROSTERのエントリを、発掘ゲームが扱うFOSSILS形式に変換
// 紋章の形は属性(EMBLEM_TYPES)から、色はレアリティ(RARITY_LABELS)から取得
const FOSSILS = CHARACTER_ROSTER.map(chara => {
  const emblem = EMBLEM_TYPES[chara.element];
  const rarityInfo = RARITY_LABELS[chara.rarity];
  return {
    id: chara.id,
    name: chara.name,
    element: chara.element,
    elementLabel: emblem.typeLabel,
    rarity: chara.rarity,
    color: rarityInfo.color,
    glow: rarityInfo.glow,
    draw(ctx, cx, cy, scale) {
      ctx.save();
      ctx.translate(cx, cy);
      ctx.scale(scale, scale);
      emblem.draw(ctx, 0, 0, this.color);
      ctx.restore();
    }
  };
});

// レアリティ抽選（16章：COMMON70% / RARE20% / EPIC10%、その中から均等抽選）
function pickRandomFossil() {
  const r = Math.random() * 100;
  let rarity;
  if (r < 70) rarity = 'common';
  else if (r < 90) rarity = 'rare';
  else rarity = 'epic';
  const pool = FOSSILS.filter(f => f.rarity === rarity);
  return pool[Math.floor(Math.random() * pool.length)];
}

// ======== SETUP ========
const bgC = document.getElementById('bg-canvas');
const fossilC = document.getElementById('fossil-canvas');
const digC = document.getElementById('dig-canvas');
const particleC = document.getElementById('particle-canvas');

[bgC, fossilC, digC, particleC].forEach(c => {
  c.width = CW; c.height = CH;
});

document.getElementById('canvas-container').style.width = CW + 'px';
document.getElementById('canvas-container').style.height = CH + 'px';

const bgCtx = bgC.getContext('2d');
const fossilCtx = fossilC.getContext('2d');
const digCtx = digC.getContext('2d');
const particleCtx = particleC.getContext('2d');

// ======== STATE ========
let currentTool = 'hammer';
let hp = 100;
let fossilDamage = 0; // 0-100
let fossilPixels = new Set(); // which grid cells are fossil
let dirtMap = []; // 各セルのHP: 0=掘り済み, -1=bedrock
let exposedFossil = new Set();
let totalFossilPixels = 0;
let particles = [];
let isPointerDown = false;
let lastX = -1, lastY = -1;
let hitCellsThisStroke = new Set(); // 1ストローク中に既にダメージ済みのセル
let fossilDamagedAt = new Map();    // 化石セルごとの最終ダメージ時刻（ms）
const FOSSIL_DMG_COOLDOWN = 600;    // 同じ化石セルへのダメージ間隔（ms）

// セルの初期HP設定
// ハンマー1クリック=damage2、ドラッグ連続でも1セルに1回しか当たらない設計
const DIRT_HP_HARD = 8;
const DIRT_HP_SOFT = 4;
// 化石セルはHPを持たない。土セルが0になれば化石が見える。

const TOOLS = {
  hammer: { radius: 36, damage: 2, fossilPenalty: 1, maxHitPerCall: 1, label: '🔨 ハンマー' },
  drill:  { radius: 5,  damage: 1, fossilPenalty: 1, label: '🔩 ドリル'  },
};

// 赤メーター（骨ダメージ）は独立管理。0〜100。
// 赤が増えると有効露出度（青）を上から押し下げる
let redMeter = 0;

// 制限時間
const TIME_LIMIT = 90; // 秒
let timeLeft = TIME_LIMIT;
let timerInterval = null;

// ======== INIT GAME ========
let currentFossil = null; // このセッションで発掘中のキャラ

function initGame() {
  // 岩を1個消費。足りなければ発掘を開始せず案内を出す
  if (!GameData.useRock()) {
    showNoRockScreen();
    return;
  }
  updateRockHUD();

  currentFossil = pickRandomFossil();

  hp = 100;
  fossilDamage = 0;
  redMeter = 0;
  fossilDamagedAt.clear();
  exposedFossil.clear();
  particles = [];
  isPointerDown = false;
  lastDigTime = 0;
  lastX = -1; lastY = -1;
  document.getElementById('result-screen').classList.remove('show');

  timeLeft = TIME_LIMIT;
  document.getElementById('time-left').textContent = timeLeft;
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    document.getElementById('time-left').textContent = Math.max(0, timeLeft);
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      showResult(true); // 時間切れ
    }
  }, 1000);

  updateHUD();

  document.getElementById('fossil-label').textContent = '???';

  drawBackground();
  drawFossilLayer(currentFossil);
  buildDirtMap();
  initRockNoise();
  drawDirt();
}

function updateRockHUD() {
  const el = document.getElementById('rock-count');
  if (el) el.textContent = GameData.getRockCount();
}

function showNoRockScreen() {
  const screen = document.getElementById('result-screen');
  document.getElementById('fossil-label').textContent = '---';
  document.getElementById('fossil-rarity').textContent = '';
  document.getElementById('fossil-name').textContent = '岩がありません';
  document.getElementById('result-grade').textContent = '⛏';
  document.getElementById('result-grade').style.color = '#c8b89a';
  document.getElementById('result-score').textContent = 'クエストやダンジョンをクリアして岩を集めよう';
  screen.classList.add('show');
}

function drawBackground() {
  const grad = bgCtx.createLinearGradient(0, 0, 0, CH);
  grad.addColorStop(0, '#4a3d30');
  grad.addColorStop(0.5, '#3a3026');
  grad.addColorStop(1, '#2c241c');
  bgCtx.fillStyle = grad;
  bgCtx.fillRect(0, 0, CW, CH);

  // 岩の節理（割れ目）模様
  bgCtx.strokeStyle = '#00000033';
  bgCtx.lineWidth = 1;
  for (let y = 0; y < CH; y += 18 + Math.random() * 10) {
    bgCtx.beginPath();
    bgCtx.moveTo(0, y);
    let px = 0;
    while (px < CW) {
      px += 20 + Math.random() * 30;
      bgCtx.lineTo(px, y + (Math.random() - 0.5) * 6);
    }
    bgCtx.stroke();
  }
}

function drawFossilLayer(fossil) {
  fossilCtx.clearRect(0, 0, CW, CH);

  // glow
  const cx = CW / 2, cy = CH / 2;
  const grad = fossilCtx.createRadialGradient(cx, cy, 20, cx, cy, 160);
  grad.addColorStop(0, fossil.glow + '44');
  grad.addColorStop(1, 'transparent');
  fossilCtx.fillStyle = grad;
  fossilCtx.fillRect(0, 0, CW, CH);

  fossilCtx.shadowColor = fossil.color;
  fossilCtx.shadowBlur = 18;
  fossilCtx.strokeStyle = fossil.color;
  fossilCtx.lineWidth = 6;
  fossilCtx.lineCap = 'round';
  fossilCtx.lineJoin = 'round';

  fossil.draw(fossilCtx, cx, cy, 1.6);
  fossilCtx.shadowBlur = 0;

  // Now scan which dig-grid cells contain fossil pixels
  const imgData = fossilCtx.getImageData(0, 0, CW, CH);
  fossilPixels = new Set();
  for (let row = 0; row < ROWS; row++) {
    for (let col = 0; col < COLS; col++) {
      // sample center of cell
      const px = Math.floor(col * CELL + CELL / 2);
      const py = Math.floor(row * CELL + CELL / 2);
      const idx = (py * CW + px) * 4;
      if (imgData.data[idx + 3] > 60) {
        fossilPixels.add(row * COLS + col);
      }
    }
  }
  totalFossilPixels = fossilPixels.size;
}

function buildDirtMap() {
  dirtMap = new Array(ROWS * COLS).fill(DIRT_HP_HARD);

  // 枠をbedrock (-1)
  for (let col = 0; col < COLS; col++) {
    dirtMap[col] = -1;
    dirtMap[(ROWS - 1) * COLS + col] = -1;
  }
  for (let row = 0; row < ROWS; row++) {
    dirtMap[row * COLS] = -1;
    dirtMap[row * COLS + COLS - 1] = -1;
  }
  // 岩は全セル均一HP（チェッカーボード状のノイズを避ける）
}

// 岩肌の固定ノイズ（毎フレーム再計算しない事前生成テーブル）
let rockNoise = [];
function initRockNoise() {
  rockNoise = new Array(ROWS * COLS);
  for (let i = 0; i < rockNoise.length; i++) {
    rockNoise[i] = Math.random();
  }
}

// HPの段階（4段階）。段が進むほど色がはっきり変わる：暗い岩 → 茶 → 砂色 → 白っぽい石灰質
const ROCK_STAGES = [
  { hue: 22, sat: 38, light: 28 }, // 満タン：濃い赤茶の岩
  { hue: 26, sat: 48, light: 40 }, // 1撃：茶褐色
  { hue: 32, sat: 58, light: 54 }, // 2撃：黄土色（カセキが見えてくる手前）
  { hue: 38, sat: 55, light: 68 }, // 3撃：明るいオレンジがかった砂色、崩壊寸前
];

function drawDirt() {
  digCtx.clearRect(0, 0, CW, CH);

  for (let row = 0; row < ROWS; row++) {
    for (let col = 0; col < COLS; col++) {
      const idx2 = row * COLS + col;
      const hp = dirtMap[idx2];
      if (hp === 0) continue; // 掘り済み=透明
      const x = col * CELL, y = row * CELL;

      if (hp === -1) {
        digCtx.fillStyle = '#14120e';
        digCtx.fillRect(x, y, CELL, CELL);
        continue;
      }

      const maxHp = DIRT_HP_HARD;
      const ratio = Math.max(0, hp / maxHp);
      const stageIndex = ratio > 0.75 ? 0 : ratio > 0.5 ? 1 : ratio > 0.25 ? 2 : 3;
      const stage = ROCK_STAGES[stageIndex];

      // 岩目ノイズ（事前生成）でまだら模様を出す
      const noise = (rockNoise[idx2] - 0.5) * 16;
      digCtx.fillStyle = `hsl(${stage.hue}, ${stage.sat}%, ${Math.max(10, stage.light + noise)}%)`;
      digCtx.fillRect(x, y, CELL, CELL);

      // 掘られたセルに隣接している岩は「欠けた縁」として暗いランダム斑点を足す
      const isEdge =
        (dirtMap[idx2 - 1] === 0) || (dirtMap[idx2 + 1] === 0) ||
        (dirtMap[idx2 - COLS] === 0) || (dirtMap[idx2 + COLS] === 0);
      if (isEdge) {
        const edgeNoise = rockNoise[idx2];
        digCtx.fillStyle = `rgba(0,0,0,${0.15 + edgeNoise * 0.25})`;
        if (edgeNoise < 0.3) digCtx.fillRect(x, y, CELL, 2);
        else if (edgeNoise < 0.6) digCtx.fillRect(x, y, 2, CELL);
        else if (edgeNoise < 0.8) digCtx.fillRect(x + CELL - 2, y, 2, CELL);
        else digCtx.fillRect(x, y + CELL - 2, CELL, 2);
      }

      // 彫れてる部分は内側にうっすら暗い縁取りを足して「凹み」を強調
      if (stageIndex >= 1) {
        digCtx.fillStyle = `rgba(0,0,0,${0.12 + stageIndex * 0.05})`;
        digCtx.fillRect(x, y, CELL, 1);
        digCtx.fillRect(x, y, 1, CELL);
      }
      if (stageIndex >= 2) {
        digCtx.fillStyle = `rgba(255,255,255,0.08)`;
        digCtx.fillRect(x, y + CELL - 1, CELL, 1);
      }
    }
  }
}

// ======== DIG ========
function dig(px, py) {
  const tool = TOOLS[currentTool];
  const col = Math.floor(px / CELL);
  const row = Math.floor(py / CELL);
  const r = Math.ceil(tool.radius / CELL);
  let fossilHitThisCall = false;       // ドリル用：このdig呼び出しで骨に触れたか
  let hammerBreachCount = 0;           // ハンマー用：このdig呼び出しで貫通させた化石セル数

  for (let dr = -r; dr <= r; dr++) {
    for (let dc = -r; dc <= r; dc++) {
      const nc = col + dc, nr = row + dr;
      if (nc < 1 || nc >= COLS - 1 || nr < 1 || nr >= ROWS - 1) continue;
      const dist = Math.sqrt(dc * dc + dr * dr) * CELL;
      if (dist > tool.radius) continue;

      const idx = nr * COLS + nc;
      const isFossil = fossilPixels.has(idx);
      const cellHp = dirtMap[idx];

      if (currentTool === 'drill') {
        // ドリル：露出済みの骨に触れたら毎回判定（0.3秒蓄積）
        if (isFossil && cellHp === 0) {
          fossilHitThisCall = true;
          continue;
        }
      }
      // ハンマーは「骨に触れた」だけでは無罪。貫通した瞬間だけが罰せられる（下記参照）

      if (hitCellsThisStroke.has(idx)) continue;

      // 土を削る（化石の上の土も含む、貫通するまではダメージなし）
      if (cellHp === -1 || cellHp === 0) continue;

      const falloff = 1 - (dist / tool.radius) * 0.5;
      const dmg = Math.max(1, Math.round(tool.damage * falloff));
      const newHp = Math.max(0, cellHp - dmg);
      dirtMap[idx] = newHp;
      hitCellsThisStroke.add(idx);

      if (newHp === 0) {
        if (isFossil) {
          exposedFossil.add(idx);
          spawnParticles(nc * CELL + CELL/2, nr * CELL + CELL/2, '#fff8aa', 3);
          if (currentTool === 'hammer') {
            // ハンマーで貫通させた化石セルをカウント（範囲攻撃の事故）
            hammerBreachCount++;
          }
        } else {
          spawnParticles(nc * CELL + CELL/2, nr * CELL + CELL/2, '#9a958c', 1);
        }
      } else if (Math.random() < 0.2) {
        spawnParticles(nc * CELL + CELL/2, nr * CELL + CELL/2, '#6a655c', 1);
      }
    }
  }

  // ハンマー：貫通したセル数をストローク全体で累積し、累積分すべてにダメージ
  // （スワイプで一気に何個も貫通させるほど重くなる。削り心地は元のまま変更しない）
  if (currentTool === 'hammer' && hammerBreachCount > 0) {
    redMeter = Math.min(100, redMeter + tool.fossilPenalty * hammerBreachCount);
    flashDamage();
  }

  // ドリル：骨に触れ続けた時間で判定（0.3秒）
  if (currentTool === 'drill') {
    if (fossilHitThisCall) {
      if (fossilTouchStart === null) {
        fossilTouchStart = Date.now();
      } else if (Date.now() - fossilTouchStart >= 150) {
        redMeter = Math.min(100, redMeter + tool.fossilPenalty);
        fossilTouchStart = Date.now();
        flashDamage();
      }
    } else {
      fossilTouchStart = null;
    }
  }

  drawDirt();
  updateHUD();
  checkComplete();
}

function flashDamage() {
  const flash = document.getElementById('damage-flash');
  flash.style.background = 'rgba(255,60,60,0.35)';
  setTimeout(() => flash.style.background = 'rgba(255,60,60,0)', 120);
}

// ======== PARTICLES ========
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 3,
      vy: -Math.random() * 3 - 1,
      life: 1.0,
      color,
      r: 2 + Math.random() * 2
    });
  }
}

function updateParticles() {
  particleCtx.clearRect(0, 0, CW, CH);
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.12;
    p.life -= 0.04;
    particleCtx.globalAlpha = p.life;
    particleCtx.fillStyle = p.color;
    particleCtx.beginPath();
    particleCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    particleCtx.fill();
  });
  particleCtx.globalAlpha = 1;
  requestAnimationFrame(updateParticles);
}

// ======== HUD ========
function updateHUD() {
  const bluePct = totalFossilPixels > 0 ? Math.round((exposedFossil.size / totalFossilPixels) * 100) : 0;
  // 露出度はそのまま表示（結果画面と一致させる）。ダメージは警告バー/HPで別表示
  document.getElementById('expose-pct').textContent = bluePct;
  document.getElementById('hp-val').textContent = Math.max(0, 100 - redMeter);
  // 警告バー：赤メーターの量を表示（増えるほど危険）
  document.getElementById('warning-fill').style.width = (100 - redMeter) + '%';
}

// ======== COMPLETE ========
function checkComplete() {
  const bluePct = totalFossilPixels > 0 ? exposedFossil.size / totalFossilPixels : 0;
  // 露出率95%以上 or 赤メーター100で終了
  if (bluePct >= 0.95 || redMeter >= 100) {
    clearInterval(timerInterval);
    setTimeout(() => showResult(false), 400);
  }
}

function showResult(timeUp) {
  clearInterval(timerInterval);
  const fossil = currentFossil;
  const bluePct = totalFossilPixels > 0 ? Math.round((exposedFossil.size / totalFossilPixels) * 100) : 0;
  const rarity = RARITY_LABELS[fossil.rarity] || RARITY_LABELS.common;

  document.getElementById('fossil-label').textContent = fossil.name;
  const rarityEl = document.getElementById('fossil-rarity');
  rarityEl.textContent = `${rarity.label} ／ ${fossil.elementLabel}属性`;
  rarityEl.style.color = rarity.color;

  if (redMeter >= 100) {
    // 化石破壊 → 発掘失敗、復元不可（獲得なし）
    document.getElementById('fossil-name').textContent = fossil.name + ' の化石';
    document.getElementById('result-grade').textContent = '💀 発掘失敗';
    document.getElementById('result-grade').style.color = '#ff4444';
    document.getElementById('result-score').textContent =
      '化石が砕けてしまった……復元不可';
    document.getElementById('result-screen').classList.add('show');
    return;
  }

  if (timeUp && bluePct < 95) {
    // 時間切れで未完成 → 失敗（獲得なし）
    document.getElementById('fossil-name').textContent = fossil.name + ' の化石';
    document.getElementById('result-grade').textContent = '⏱ 時間切れ';
    document.getElementById('result-grade').style.color = '#ff9944';
    document.getElementById('result-score').textContent =
      `露出 ${bluePct}% ／ 95%に届かず発掘失敗`;
    document.getElementById('result-screen').classList.add('show');
    return;
  }

  // 露出率95%以上で満点100、未達ならその分減点。さらに骨ダメージで減点
  const exposeScore = Math.min(100, Math.round((bluePct / 95) * 100));
  const score = Math.max(0, exposeScore - redMeter);

  let grade, gradeColor;
  if (score >= 95) { grade = 'S評価'; gradeColor = '#ffd700'; }
  else if (score >= 85) { grade = 'A評価'; gradeColor = '#aaddff'; }
  else if (score >= 70) { grade = 'B評価'; gradeColor = '#a0e880'; }
  else if (score >= 50) { grade = 'C評価'; gradeColor = '#f0d080'; }
  else { grade = 'D評価'; gradeColor = '#ff8866'; }
  const digGrade = grade[0]; // 'S'|'A'|'B'|'C'|'D'

  // 発掘成功 → 実際にインベントリへ保存
  const instance = GameData.addCharacterToInventory(fossil.id, digGrade);
  const finalStats = GameData.calculateInstanceStats(instance);

  document.getElementById('fossil-name').textContent = fossil.name + ' の化石';
  document.getElementById('result-grade').textContent = grade;
  document.getElementById('result-grade').style.color = gradeColor;
  document.getElementById('result-score').textContent =
    `露出 ${bluePct}% ／ 骨ダメージ -${redMeter}pt ／ スコア ${score}pt` +
    (instance.individuality.perfect ? ' ／ ★厳選当たり個体！' : '') +
    ` ／ HP${finalStats.hp} 攻${finalStats.atk} 防${finalStats.def} 速${finalStats.spd}`;
  document.getElementById('result-screen').classList.add('show');
}

// ======== EVENTS ========
document.querySelectorAll('.tool-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentTool = btn.dataset.tool;
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

document.getElementById('next-btn').addEventListener('click', () => {
  initGame();
});

function getPos(e) {
  const rect = digC.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return {
    x: src.clientX - rect.left,
    y: src.clientY - rect.top
  };
}

let drillInterval = null;
let pointerPos = { x: 0, y: 0 };
let fossilTouchStart = null; // 露出骨に触れ始めた時刻

digC.addEventListener('pointerdown', e => {
  isPointerDown = true;
  hitCellsThisStroke.clear();
  fossilTouchStart = null;
  const {x, y} = getPos(e);
  pointerPos = {x, y};
  lastX = x; lastY = y;
  dig(x, y);

  if (currentTool === 'drill') {
    drillInterval = setInterval(() => {
      if (!isPointerDown) return;
      hitCellsThisStroke.clear();
      dig(pointerPos.x, pointerPos.y);
    }, 480);
  }
});

digC.addEventListener('pointermove', e => {
  if (!isPointerDown) return;
  if (currentTool === 'hammer') return; // ハンマーはタップ専用、スワイプでは削れない
  const {x, y} = getPos(e);
  pointerPos = {x, y};
  const dist = Math.hypot(x - lastX, y - lastY);
  const stepSize = 5;
  const steps = Math.max(1, Math.floor(dist / stepSize));
  for (let i = 1; i <= steps; i++) {
    dig(lastX + (x - lastX) * i / steps, lastY + (y - lastY) * i / steps);
  }
  lastX = x; lastY = y;
});

function stopDig() {
  isPointerDown = false;
  hitCellsThisStroke.clear();
  fossilTouchStart = null;
  clearInterval(drillInterval);
  drillInterval = null;
}

digC.addEventListener('pointerup', stopDig);
digC.addEventListener('pointerleave', stopDig);

// ======== START ========
updateParticles();
initGame();
</script>
