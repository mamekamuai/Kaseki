// 属性/ゴールド/岩ダンジョンの難易度による敵HP倍率（称号ダンジョンは既存のTITLE_DUNGEON_HP_MULを使用）
// 難易度1(初級)の時点でクエストステージ20(HP倍率2.52倍)を確実に上回るよう3.0スタートに設定
const DUNGEON_DIFFICULTY_HP_MUL = [3.0, 3.9, 5.1, 6.6, 8.6, 11.2, 14.5, 18.9, 24.6, 32.0];

// クエスト/ダンジョンの敵チームを生成
// クエストはselectedQuestStage(1〜20)、ダンジョンはfloor(階層)＋難易度で敵HPをスケーリングする
function buildQuestEnemyTeam(floor) {
  const allDefs = GameData.getNormalCharacterList();

  if (dungeonKind === 'normal') {
    // 通常クエスト：ステージ番号でスケーリング（1〜20、+8%/ステージ）。敵数もステージが進むほど増えやすくする
    const stageHpMul = 1 + (selectedQuestStage - 1) * 0.08;
    const minCount = Math.min(6, 1 + Math.floor((selectedQuestStage - 1) / 4));
    const count = minCount + Math.floor(Math.random() * (6 - minCount + 1));
    // 序盤はCOMMONのみ、ステージが進むごとに段階的に高レアリティを解放する
    // （HP/攻撃/防御/素早さ全部がステージ倍率で伸びる仕様なので、序盤からMYTHIC級が出ると理不尽に強くなるため）
    let allowedRarities;
    if (selectedQuestStage <= 4) allowedRarities = ['common'];
    else if (selectedQuestStage <= 8) allowedRarities = ['common', 'rare'];
    else if (selectedQuestStage <= 12) allowedRarities = ['common', 'rare', 'epic'];
    else if (selectedQuestStage <= 16) allowedRarities = ['common', 'rare', 'epic', 'mythic'];
    else allowedRarities = ['common', 'rare', 'epic', 'mythic'];
    const pool = allDefs.filter(m => allowedRarities.includes(m.rarity));
    const shuffled = [...pool].sort(() => Math.random() - 0.5);
    return shuffled.slice(0, count).map(m => buildEnemyFighter(m.id, stageHpMul));
  }

  const floorHpMul = 1 + (floor - 1) * 0.15;

  if (dungeonKind === 'title') {
    // 称号ダンジョン：称号キャラ1体のみのボス単体戦（HPのみ難易度倍率）
    const titleId = `title_${dungeonElement}`;
    const titleHpMul = (GameData.TITLE_DUNGEON_HP_MUL[dungeonDifficulty] || 1) * floorHpMul;
    return [buildEnemyFighter(titleId, titleHpMul)];
  }

  const count = Math.floor(Math.random() * 6) + 1; // 1〜6体
  let pool = allDefs;
  if (dungeonKind === 'element') {
    pool = allDefs.filter(m => m.element === dungeonElement);
  } else if (dungeonKind === 'gold' || dungeonKind === 'rock') {
    pool = allDefs; // ゴールド/岩ダンジョンは属性を絞らない代わりに敵が少し硬め
  }
  const diffMul = DUNGEON_DIFFICULTY_HP_MUL[dungeonDifficulty - 1];
  const extraMul = (dungeonKind === 'gold' || dungeonKind === 'rock') ? 1.2 : 1.0;
  const shuffled = [...pool].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, count).map(m => buildEnemyFighter(m.id, floorHpMul * extraMul * diffMul));
}

// 対人戦（現状はダミー6体。将来的にはFirestore保存の他プレイヤーデータをNPC化する想定 - 19章）
function buildPvpEnemyTeam() {
  const allDefs = GameData.getNormalCharacterList();
  const shuffled = [...allDefs].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, 6).map(m => buildEnemyFighter(m.id));
}

// ゴールド報酬計算式：基礎額 × 階層倍率 × 難易度倍率
// 通常クエストは「進むほど増えるが、ゴールドダンジョンは絶対に超えない」ように基礎額を一段低く設定
const GOLD_BASE_BY_KIND = { normal: 188, element: 150, gold: 275, rock: 130, title: 1125 }; // 全体+25%（難易度10×約20周でLv100+覚醒5到達が目安）
const FLOOR_GOLD_MUL = [1.0, 1.6, 2.4]; // 1〜3階層
const DUNGEON_DIFFICULTY_GOLD_MUL = [1.0, 1.5, 2.2, 3.2, 4.5, 7.2, 11.4, 18.0, 28.6, 45.5]; // 難易度1〜10（ゴールド/岩ダンジョンのみ10まで使用）

function getFloorGoldReward(floor) {
  const base = GOLD_BASE_BY_KIND[dungeonKind] || GOLD_BASE_BY_KIND.normal;
  if (dungeonKind === 'normal') {
    // 通常クエストはステージ番号(1〜20)で報酬が伸びる。ゴールドダンジョン最低ライン(diff1)は超えない範囲で調整
    const stageMul = 1 + (selectedQuestStage - 1) * 0.02;
    return Math.round(base * stageMul);
  }
  const floorMul = FLOOR_GOLD_MUL[Math.min(floor, FLOOR_GOLD_MUL.length) - 1] || FLOOR_GOLD_MUL[FLOOR_GOLD_MUL.length - 1];
  const diffMul = DUNGEON_DIFFICULTY_GOLD_MUL[dungeonDifficulty - 1];
  return Math.round(base * floorMul * diffMul);
}

// このダンジョンの最終階層クリア時に手に入るノーマル岩の個数（岩ダンジョン専用。難易度が上がるほど増える）
// クエストのノーマル岩報酬：ステージ帯ごとに段階制（厳選のしやすさに直結するため急に増やさない）
function getQuestRockReward(stage) {
  if (stage <= 5) return 1;
  if (stage <= 10) return 2;
  if (stage <= 15) return 3;
  return 4; // 16〜20
}

// このダンジョンの最終階層クリア時に手に入る「上質岩」の個数（岩ダンジョン専用、5段階）
const ROCK_DUNGEON_REWARD = [5, 7, 9, 11, 13];
function getRockDungeonReward() {
  return ROCK_DUNGEON_REWARD[dungeonDifficulty - 1] || ROCK_DUNGEON_REWARD[ROCK_DUNGEON_REWARD.length - 1];
}

// 称号ダンジョンのイベント岩ドロップ率（確定ではなく難易度依存の抽選。難易度5で確定100%）
const TITLE_ROCK_DROP_RATE = [0.3, 0.45, 0.6, 0.8, 1.0];
function getTitleRockDropRate() {
  return TITLE_ROCK_DROP_RATE[dungeonDifficulty - 1] || 1.0;
}

// 1回の挑戦を開始するのに必要なスタミナ。難易度/ステージが上がるほど消費も増える
// nOverrideを渡すと、現在選択中でなくても任意のステージ/難易度のコストを計算できる（一覧表示用）
function getStaminaCost(nOverride) {
  if (!isStageMode()) return 0; // 闘技場・フリー対戦はスタミナ消費なし
  if (dungeonKind === 'normal') {
    const n = nOverride != null ? nOverride : selectedQuestStage;
    return 4 + Math.floor((n - 1) / 4); // Lv1-4:4, 5-8:5...最大9
  }
  const n = nOverride != null ? nOverride : dungeonDifficulty;
  if (dungeonKind === 'element') return 6 + (n - 1) * 1;
  if (dungeonKind === 'gold') return 8 + (n - 1) * 2;
  if (dungeonKind === 'rock') return 7 + (n - 1) * 2;
  if (dungeonKind === 'title') return 12 + (n - 1) * 3;
  return 5;
}

function refreshStatusBar() {
  const stamina = GameData.getStamina();
  const maxStamina = GameData.getMaxStamina();
  const level = GameData.getPlayerLevel();
  document.getElementById('status-gold').textContent = `💰${GameData.getGold()}G`;
  const stamEl = document.getElementById('status-stamina');
  stamEl.textContent = `⚡${stamina}/${maxStamina}${staminaTimerSuffix()}`;
  stamEl.classList.toggle('low', stamina < getStaminaCost());
  document.getElementById('status-player-lv').textContent = `プレイヤーLv${level}`;
}

// スタミナが満タンでない時、次の回復までの残り時間を「(m:ss)」の形で付け足す
function staminaTimerSuffix() {
  const ms = GameData.getMsToNextStamina();
  if (ms <= 0) return '';
  const totalSec = Math.ceil(ms / 1000);
  const m = Math.floor(totalSec / 60);
  const s = totalSec % 60;
  return ` (${m}:${String(s).padStart(2, '0')})`;
}
// 毎秒スタミナ表示だけ更新（カウントダウンを生きて見せる）
setInterval(() => {
  const stamEl = document.getElementById('status-stamina');
  if (!stamEl) return;
  const stamina = GameData.getStamina();
  const maxStamina = GameData.getMaxStamina();
  stamEl.textContent = `⚡${stamina}/${maxStamina}${staminaTimerSuffix()}`;
}, 1000);

function showToast(text) {
  const toast = document.getElementById('status-toast');
  toast.textContent = text;
  toast.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => toast.classList.remove('show'), 2600);
}

function showStaminaToast() {
  const stamina = GameData.getStamina();
  const maxStamina = GameData.getMaxStamina();
  if (stamina >= maxStamina) { showToast('⚡スタミナは満タンです'); return; }
  const ms = GameData.getMsToNextStamina();
  const totalSec = Math.ceil(ms / 1000);
  const min = Math.floor(totalSec / 60);
  const sec = totalSec % 60;
  showToast(`⚡次の回復まで ${min}分${sec}秒`);
}

function showLevelToast() {
  const level = GameData.getPlayerLevel();
  const exp = GameData.getPlayerExp();
  const need = GameData.getExpToNextLevel(level);
  if (level >= 100) { showToast('プレイヤーLvは上限です'); return; }
  showToast(`次のLvまで EXP ${exp}/${need}`);
}

// ========================================================
// コマンドボタン処理
// ========================================================
function onAttackCmd() {
  if (isAutoOnlyMode() || !battleRunning) return;
  if (isAuto) return; // オート中は無視
  if (pendingPlayerAction) {
    pendingPlayerAction({ type: 'attack' });
    pendingPlayerAction = null;
  }
}

function onSkillCmd() {
  if (isAutoOnlyMode() || !battleRunning) return;
  if (isAuto) return;
  if (!pendingPlayerAction || !pendingActor) return;
  openSkillMenu(pendingActor.f);
}

function openSkillMenu(f) {
  const list = document.getElementById('skill-menu-list');
  list.innerHTML = '';
  f.skills.forEach((sk, idx) => {
    const usable = f.sp >= sk.sp;
    const item = document.createElement('button');
    item.className = 'skill-menu-item' + (usable ? '' : ' disabled');
    item.disabled = !usable;
    item.innerHTML = `
      <span>
        <div class="sk-name">${sk.name}</div>
        <div class="sk-desc">${describeSkill(sk)}</div>
      </span>
      <span class="sk-sp">SP${sk.sp}</span>
    `;
    item.addEventListener('click', () => selectSkill(idx));
    list.appendChild(item);
  });
  document.getElementById('skill-menu-overlay').classList.add('show');
}

function closeSkillMenu() {
  document.getElementById('skill-menu-overlay').classList.remove('show');
}

function selectSkill(idx) {
  closeSkillMenu();
  if (pendingPlayerAction) {
    pendingPlayerAction({ type: 'skill', skillIndex: idx });
    pendingPlayerAction = null;
  }
}

function onRunCmd() {
  if (isAutoOnlyMode()) return;
  battleRunning = false;
  closeSkillMenu();
  if (pendingPlayerAction) { pendingPlayerAction({ type: 'run' }); pendingPlayerAction = null; }
  setLog('逃げ出した！');
  setTimeout(() => showResult(true), 400);
}

function toggleAuto() {
  if (isAutoOnlyMode()) return;
  isAuto = !isAuto;
  const btn = document.getElementById('btn-auto');
  btn.classList.toggle('active', isAuto);
  setLog(isAuto ? 'オートバトル ON' : 'オートバトル OFF（攻撃/スキルで操作）');
  closeSkillMenu();
  // オートONにした時、手動待ち中なら自動で攻撃を実行
  if (isAuto && pendingPlayerAction) {
    pendingPlayerAction({ type: 'attack' });
    pendingPlayerAction = null;
    pendingActor = null;
  }
}

// プレイヤーの行動を待つ（クエスト/ダンジョン手動操作時）
function waitForPlayerInput(actor) {
  return new Promise(resolve => {
    if (isAuto || isAutoOnlyMode()) {
      // オートor闘技場/フリー対戦はランダム自動行動
      resolve({ type: Math.random() < 0.3 ? 'skill' : 'attack' });
    } else {
      // 手動操作待ち
      pendingActor = actor;
      pendingPlayerAction = resolve;
    }
  });
}

let turnCount = 0;

const TITLE_CONCEPT_LABEL = { gravity: '重力', illusion: '幻', chronos: '時空', chance: '機会', luck: '幸運' };
const TITLE_CONCEPT_ICON = { gravity: '🌌', illusion: '🌀', chronos: '⏳', chance: '🎲', luck: '🍀' };

function dungeonModeLabel() {
  if (currentMode === 'arena') return '闘技場';
  if (currentMode === 'free') return 'フリー対戦';
  if (dungeonKind === 'normal') return 'クエスト';
  if (dungeonKind === 'gold') return 'ゴールドダンジョン';
  if (dungeonKind === 'rock') return '岩ダンジョン';
  if (dungeonKind === 'title') return `${TITLE_CONCEPT_LABEL[dungeonElement] || dungeonElement}称号ダンジョン`;
  return `${GameData.ELEM_LABEL[dungeonElement] || dungeonElement}ダンジョン`;
}

function showResult(fled){
  battleUnresolved = false;
  const pAlive = playerTeam.filter(f=>f.hp>0).length;
  const oAlive = opponentTeam.filter(f=>f.hp>0).length;
  const oDefeated = opponentTeam.filter(f=>f.hp<=0).length;
  const won = oAlive===0 && !fled;

  const title    = document.getElementById('result-title');
  const subtitle = document.getElementById('result-subtitle');
  const nextBtn  = document.getElementById('result-next-btn');
  const nextLabel= document.getElementById('result-next-label');

  document.getElementById('rs-player').textContent = `${pAlive}/6 体`;
  document.getElementById('rs-enemy').textContent  = `${oDefeated}/${opponentTeam.length} 体`;
  document.getElementById('rs-turn').textContent   = `${turnCount} ターン`;

  const rewardRow = document.getElementById('rs-reward-row');
  rewardRow.style.display = 'none';
  const hasNextFloor = won && isStageMode() && currentFloor < totalFloors;
  let justConquered = false; // ステージ20踏破 or ダンジョン最大難易度踏破のフラグ

  if (won && isStageMode()) {
    const goldAmount = getFloorGoldReward(currentFloor);
    GameData.addGold(goldAmount);
    const expAmount = Math.max(1, Math.round(goldAmount / 20));
    const expResult = GameData.addPlayerExp(expAmount);
    let rewardText = `${goldAmount}G`;

    if (!hasNextFloor) {
      // 全クリア（＝この挑戦の最終到達点）時のみ：岩の報酬＋解放処理
      if (dungeonKind === 'normal') {
        const rockAmount = getQuestRockReward(selectedQuestStage);
        GameData.addRocks(rockAmount, 'normal');
        rewardText += ` ／ 🪨ノーマル岩 ×${rockAmount}`;
        GameData.reportQuestStageCleared(selectedQuestStage);
        if (selectedQuestStage >= GameData.QUEST_MAX_STAGE) justConquered = true;
      } else if (dungeonKind === 'element') {
        const amount = (Math.floor(Math.random() * 3) + 1) + (dungeonDifficulty - 1) * 2;
        GameData.addAwakenMaterial(dungeonElement, amount);
        GameData.addRocks(1, dungeonElement);
        rewardText += ` ／ ${ELEM_ICONS[dungeonElement]}覚醒石 ×${amount} ／ ${GameData.ROCK_TYPE_INFO[dungeonElement].icon}属性岩 ×1`;
        const max = getMaxDifficulty('element');
        GameData.reportDungeonDifficultyCleared('element', dungeonElement, dungeonDifficulty, max);
        if (dungeonDifficulty >= max) justConquered = true;
      } else if (dungeonKind === 'gold') {
        GameData.addRocks(1, 'normal');
        rewardText += ` ／ 🪨ノーマル岩 ×1`;
        const max = getMaxDifficulty('gold');
        GameData.reportDungeonDifficultyCleared('gold', null, dungeonDifficulty, max);
        if (dungeonDifficulty >= max) justConquered = true;
      } else if (dungeonKind === 'rock') {
        const rockAmount = getRockDungeonReward();
        GameData.addRocks(rockAmount, 'quality');
        rewardText += ` ／ ${GameData.ROCK_TYPE_INFO.quality.icon}上質岩 ×${rockAmount}`;
        const max = getMaxDifficulty('rock');
        GameData.reportDungeonDifficultyCleared('rock', null, dungeonDifficulty, max);
        if (dungeonDifficulty >= max) justConquered = true;
      } else if (dungeonKind === 'title') {
        const amount = 5 + (dungeonDifficulty - 1) * 3;
        GameData.addAwakenMaterial(dungeonElement, amount);
        rewardText += ` ／ ${TITLE_CONCEPT_ICON[dungeonElement] || '👑'}覚醒石 ×${amount}`;
        // 確定岩は難易度依存のドロップ率抽選（そのコンセプトのキャラが確定で出現する専用岩）
        const rockKey = `title_${dungeonElement}`;
        const rockInfo = GameData.ROCK_TYPE_INFO[rockKey];
        const dropRate = getTitleRockDropRate();
        if (Math.random() < dropRate) {
          GameData.addRocks(1, rockKey);
          rewardText += ` ／ ${rockInfo.icon}${rockInfo.label} ×1`;
        } else {
          rewardText += ` ／ ${rockInfo.icon}${rockInfo.label}ドロップならず…（${Math.round(dropRate * 100)}%抽選）`;
        }
        const max = getMaxDifficulty('title');
        GameData.reportDungeonDifficultyCleared('title', dungeonElement, dungeonDifficulty, max);
        if (dungeonDifficulty >= max) justConquered = true;
      }
    }
    if (expResult.leveledUp) {
      rewardText += ` ／ プレイヤーLv${expResult.level}に上昇！（スタミナ上限${GameData.getMaxStamina()}）`;
    }
    document.getElementById('rs-reward').textContent = rewardText;
    rewardRow.style.display = 'flex';
    refreshStatusBar();
  }

  // 闘技場のみレートが変動する（フリー対戦は変動なし）
  if (!fled && currentMode === 'arena') {
    const delta = won ? 20 : -15;
    GameData.addRating(delta);
    const newRating = GameData.getRating();
    document.getElementById('rs-reward').textContent = `Rate ${won ? '+' : ''}${delta} → ${newRating}`;
    rewardRow.style.display = 'flex';
    document.getElementById('status-mode-label').textContent = `${MODE_LABELS.arena}（Rate ${newRating}）`;
    refreshStatusBar();
  }

  if (fled) {
    title.textContent = '🏃 逃走'; title.style.color = '#c8b89a';
    subtitle.textContent = 'バトルから逃げ出した';
    nextBtn.textContent = 'タイトルへ戻る';
    nextLabel.textContent = '';
  } else if (won) {
    if (justConquered) {
      title.textContent = '🎉 踏破！'; title.style.color = '#ffd700';
      subtitle.textContent = isStageMode() && dungeonKind === 'normal'
        ? '全20ステージ踏破おめでとう！'
        : 'このダンジョンの最大難易度を踏破した！';
      nextBtn.textContent = 'もう一度挑戦';
      nextLabel.textContent = '';
    } else {
      title.textContent = '🏆 勝利！'; title.style.color = '#f0d080';
      if (hasNextFloor) {
        subtitle.textContent = `${currentFloor}/${totalFloors} 階層クリア！ HP・SP全回復`;
        nextBtn.textContent = `次の階層へ ▶`;
        nextLabel.textContent = `まもなく${currentFloor + 1}/${totalFloors}階層へ自動で進みます…`;
        // 階層クリアは自動進行：タップ待ちにせず一定時間後に自動で次の階層へ進む（ボタンは早送り用に残す）
        clearTimeout(autoAdvanceTimer);
        autoAdvanceTimer = setTimeout(() => { onResultNext(); }, 1400);
      } else {
        subtitle.textContent = '全クリア！';
        nextBtn.textContent = 'もう一度挑戦';
        nextLabel.textContent = '';
      }
    }
  } else {
    title.textContent = '💀 敗北'; title.style.color = '#ff6b6b';
    subtitle.textContent = '全滅してしまった…';
    nextBtn.textContent = 'タイトルへ戻る';
    nextLabel.textContent = '';
  }

  document.getElementById('result-overlay').classList.add('show');
}

function onResultNext() {
  clearTimeout(autoAdvanceTimer);
  document.getElementById('result-overlay').classList.remove('show');
  if (isStageMode() && currentFloor < totalFloors && opponentTeam.every(f => f.hp <= 0)) {
    // 次の階層へ（階層クリアのご褒美として自軍のHP・SPを全回復してから進む）
    playerTeam.forEach(f => { f.hp = f.maxHp; f.sp = f.maxSp; });
    currentFloor += 1;
    opponentTeam = buildQuestEnemyTeam(currentFloor);
    turnCount = 0;
    renderAll();
    renderStagePath();
    setLog(`${currentFloor}/${totalFloors}階層へ！ HP・SP全回復 ／ 敵${opponentTeam.length}体`);
    battleRunning = true;
    battleLoop();
  } else {
    resetBattle();
  }
}

// 闘技場：自分のレートに応じて敵の強さをスケーリングする（レートが高いほど強い相手と当たる）
function buildArenaEnemyTeam() {
  const rating = GameData.getRating();
  const scale = Math.max(0.6, Math.min(2.5, rating / GameData.RATING_START));
  const allDefs = GameData.getNormalCharacterList();
  const shuffled = [...allDefs].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, 6).map(m => buildEnemyFighter(m.id, scale));
}

function resetBattle(){
  clearTimeout(autoAdvanceTimer);
  battleRunning = false;
  turnCount = 0;
  currentFloor = 1;
  totalFloors = dungeonKind === 'title' ? 1 : 3;
  pendingPlayerAction = null;
  isAuto = isAutoOnlyMode(); // 闘技場・フリー対戦は強制オート
  document.getElementById('result-overlay').classList.remove('show');

  // 編成が空ならそもそもバトルを開始できない（スタミナも消費しない）
  const partyCheck = GameData.getPartyAsFighterDefs();
  if (partyCheck.length === 0) {
    document.getElementById('enemy-field').innerHTML = '';
    document.getElementById('player-field').innerHTML = `
      <div id="empty-party-msg">
        編成にキャラがいません<br>
        <a href="formation.html">編成画面でパーティを組む ▶</a>
      </div>`;
    setLog('⚠ 編成が空です。先にパーティを編成してください');
    refreshStatusBar();
    return;
  }

  // 対人戦(闘技場・フリー対戦)は、いきなり戦闘を始めずマッチング画面で相手を確認してから開始する
  if (currentMode === 'arena' || currentMode === 'free') {
    playerTeam = getPlayerTeamDefs();
    opponentTeam = currentMode === 'arena' ? buildArenaEnemyTeam() : buildPvpEnemyTeam();
    showMatchupPreview();
    return;
  }

  startBattleAfterMatchup();
}

// 対人戦のマッチング確認画面（ドラエグ風：両チームのプレビューを見てから「たたかう」で開始）
const CPU_NAMES = ['ハンター見習い', '野良コレクター', '旅の発掘士', 'ライバル冒険者', '謎のマスク', 'ベテラン調教師'];

function showMatchupPreview() {
  const el = document.getElementById('matchup-teams');

  if (currentMode === 'free' || currentMode === 'arena') {
    // 対人戦（フリー対戦・闘技場）：キャラは見せず、名前とレベル/レートだけのシンプルなVS画面（相手を上、自軍を下に）
    const cpuName = CPU_NAMES[Math.floor(Math.random() * CPU_NAMES.length)];
    let oppLabel, myLabel;
    if (currentMode === 'free') {
      const myLevel = GameData.getPlayerLevel();
      const cpuLevel = Math.max(1, myLevel + Math.floor(Math.random() * 7) - 3);
      oppLabel = `Lv${cpuLevel}`;
      myLabel = `Lv${myLevel}`;
    } else {
      const myRating = GameData.getRating();
      const cpuRating = Math.max(1000, Math.round(myRating + (Math.random() * 160 - 80)));
      oppLabel = `Rate ${cpuRating}`;
      myLabel = `Rate ${myRating}`;
    }
    el.innerHTML = `
      <div class="matchup-name-row">
        <span class="matchup-name">${cpuName}</span>
        <span class="matchup-name-lv">${oppLabel}</span>
      </div>
      <div class="matchup-vs">VS</div>
      <div class="matchup-name-row">
        <span class="matchup-name">あなた</span>
        <span class="matchup-name-lv">${myLabel}</span>
      </div>
    `;
    document.getElementById('matchup-title').textContent = currentMode === 'free' ? 'フリー対戦' : '闘技場';
    document.getElementById('matchup-overlay').classList.add('show');
    return;
  }
}

function cancelMatchup() {
  document.getElementById('matchup-overlay').classList.remove('show');
  openHub();
}

function confirmMatchup() {
  document.getElementById('matchup-overlay').classList.remove('show');
  startBattleAfterMatchup();
}

function startBattleAfterMatchup(){
  // スタミナチェック（クエスト/ダンジョンのみ消費。闘技場・フリー対戦は消費なし）
  if (isStageMode()) {
    const cost = getStaminaCost();
    if (!GameData.consumeStamina(cost)) {
      document.getElementById('enemy-field').innerHTML = '';
      document.getElementById('player-field').innerHTML = '';
      setLog(`⚡スタミナが足りません（必要${cost} / 所持${GameData.getStamina()}）`);
      refreshStatusBar();
      return;
    }
  }
  refreshStatusBar();

  playerTeam = getPlayerTeamDefs();
  // クエスト/ダンジョンは階層制、闘技場・フリー対戦はプレビュー画面で既に組んだチームをそのまま使う
  if (isStageMode()) {
    opponentTeam = buildQuestEnemyTeam(currentFloor);
  } else if (!opponentTeam || opponentTeam.length === 0) {
    opponentTeam = currentMode === 'arena' ? buildArenaEnemyTeam() : buildPvpEnemyTeam();
  }

  renderAll();
  renderStagePath();
  applyModeToCommandBar();

  // オートボタンの状態を反映
  const autoBtn = document.getElementById('btn-auto');
  autoBtn.classList.toggle('active', isAuto);

  const modeLabel = dungeonModeLabel();
  const enemyCount = opponentTeam.length;
  const floorLabel = isStageMode() ? `（${currentFloor}/${totalFloors}階層）` : '';
  const costLabel = isStageMode() ? `　⚡-${getStaminaCost()}` : '';
  setLog(`${modeLabel}バトル開始！${floorLabel} 敵${enemyCount}体${costLabel}`);

  battleRunning = true;
  battleUnresolved = true;
  battleLoop();
}

// ========================================================
// ========================================================
// 初期化
// ========================================================
GameData.grantStarterCharactersIfFirstTime();
refreshStatusBar();
document.getElementById('status-mode-label').textContent = MODE_LABELS.quest;
openHub(); // 起動時はまずモード選択ハブを表示する（いきなりバトルを始めない）
// スタミナは時間経過で回復するため、表示を定期的に更新する
setInterval(refreshStatusBar, 15000);

// ======== 離脱確認（画面移動・ブラウザバックのトラップ） ========
let pendingLeaveUrl = null;
history.pushState({ trap: true }, '');
window.addEventListener('popstate', () => { requestLeave('__back__'); });

function requestLeave(url) {
  if (!battleUnresolved) {
    // 対戦中でなければ確認なしで即座に移動（毎回の確認はテンポが悪いので対戦中のみに限定）
    window.location.href = (url && url !== '__back__') ? url : 'title.html';
    return;
  }
  pendingLeaveUrl = url;
  const msg = document.getElementById('leave-confirm-msg');
  msg.innerHTML = isStageMode()
    ? '対戦中に戻ると、消費した<span style="color:#ff8866;">スタミナは戻ってきません</span>。<br>この対戦をあきらめて戻りますか？'
    : '対戦の途中です。あきらめて戻りますか？';
  document.getElementById('leave-confirm-overlay').classList.add('show');
}
function cancelLeave() {
  document.getElementById('leave-confirm-overlay').classList.remove('show');
  pendingLeaveUrl = null;
  history.pushState({ trap: true }, '');
}
function confirmLeave() {
  document.getElementById('leave-confirm-overlay').classList.remove('show');
  const url = pendingLeaveUrl;
  pendingLeaveUrl = null;
  battleRunning = false;
  battleUnresolved = false;
  window.location.href = (url && url !== '__back__') ? url : 'title.html';
}
</script>
