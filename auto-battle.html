<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>化石対戦 - バトル</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#2b2118; display:flex; justify-content:center; font-family:'Courier New',monospace; min-height:100dvh; }
#battle-screen {
  width:100%; max-width:420px; height:100dvh; max-height:860px;
  display:flex; flex-direction:column; overflow:hidden; position:relative;
}

/* ===== 敵フィールド（上部、大きく） ===== */
#enemy-field {
  flex:0 0 auto;
  height:196px;
  background:linear-gradient(180deg,#1a3a1a 0%,#2a4a2a 60%,#3a4a2a 100%);
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(2,1fr);
  gap:4px;
  padding:8px;
  position:relative;
}

/* 敵ユニット（3×2グリッド） */
.enemy-unit {
  display:flex; flex-direction:column; align-items:center; gap:3px;
  position:relative;
  transition:transform 0.15s;
  width:100%; height:100%; min-height:0;
}
.enemy-unit.fainted { opacity:0.25; filter:grayscale(1); }
.enemy-unit.hit { animation:hitAnim 0.3s ease; }
.enemy-unit.skill-target { animation:skillHitAnim 0.4s ease; }

.enemy-img {
  flex:1; width:100%;
  border-radius:6px;
  background:rgba(0,0,0,0.35);
  border:1px solid rgba(255,255,255,0.12);
  display:flex; align-items:center; justify-content:center;
  font-size:28px;
  position:relative;
  min-height:0;
  overflow:hidden;
}
.enemy-img img { width:100%; height:100%; object-fit:cover; border-radius:6px; }

.skill-flash {
  position:absolute; top:0;left:0;right:0;bottom:0;
  border-radius:6px;
  background:rgba(255,255,255,0);
  pointer-events:none;
  transition:background 0.1s;
}

.enemy-bars { width:88px; display:flex; flex-direction:column; gap:2px; }
.enemy-hp-bar { width:100%; height:8px; background:#2b2118; border-radius:3px; overflow:hidden; }
.enemy-sp-bar { width:100%; height:6px; background:#2b2118; border-radius:2px; overflow:hidden; }
.hp-fill { height:100%; background:linear-gradient(90deg,#e05050,#f07060); transition:width 0.3s; }
.hp-fill.mid { background:linear-gradient(90deg,#e0c050,#f0d870); }
.hp-fill.high { background:linear-gradient(90deg,#50c050,#70e070); }
.sp-fill { height:100%; background:#4dc8ff; transition:width 0.3s; }

/* バー上に重ねる数値表示 */
.bar-row { position:relative; width:100%; }
.bar-num {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  font-size:9.5px; font-weight:800; color:#fff;
  white-space:nowrap; pointer-events:none; z-index:2;
  letter-spacing:0.2px;
  text-shadow:-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000,1px 1px 0 #000,0 1px 3px rgba(0,0,0,0.9);
}
.enemy-bars .bar-num { display:none; } /* 敵のHP/SP実数は非公開。バーの色・長さのみで判断させる */
.player-bars .bar-num { font-size:9px; }

/* バフ・デバフ・状態異常バッジ（アイコンに重ねて表示） */
.status-badges {
  position:absolute; top:2px; left:2px; right:2px;
  display:flex; flex-wrap:wrap; gap:2px;
  z-index:6; pointer-events:none;
}
.stbadge {
  font-size:8px; font-weight:800; line-height:1.4;
  padding:1px 3px; border-radius:3px; color:#fff;
  text-shadow:0 1px 1px rgba(0,0,0,0.7);
  box-shadow:0 1px 2px rgba(0,0,0,0.5);
}
.buff-badge    { background:rgba(60,180,80,0.92); }
.debuff-badge  { background:rgba(210,60,60,0.92); }
.ailment-badge { background:rgba(220,140,30,0.92); }
.enemy-img .stbadge  { font-size:10px; padding:2px 4px; }
.player-img .stbadge { font-size:8px; }

/* ===== テキストログ（中間） ===== */
#log-area {
  flex:0 0 auto;
  height:40px;
  background:#211c14;
  border-top:2px solid #3a3026;
  border-bottom:2px solid #3a3026;
  display:flex; align-items:center;
  padding:0 14px;
  overflow:hidden;
}
#log-text { color:#f0d080; font-size:14px; font-weight:bold; letter-spacing:1px; }

/* ===== 自分フィールド（3×2グリッド） ===== */
#player-field {
  flex:1;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(2,1fr);
  gap:3px;
  padding:6px 8px;
  background:#2b2118;
  min-height:0;
}

#empty-party-msg {
  grid-column:1 / -1; grid-row:1 / -1;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:10px;
  color:#8a7c64; font-size:13px; text-align:center; line-height:1.8;
}
#empty-party-msg a {
  color:#f0d080; font-weight:bold; text-decoration:underline;
}

.player-unit {
  display:flex; flex-direction:column; align-items:center; gap:2px;
  background:#332a1e;
  border-radius:6px;
  border:1px solid #3a3026;
  padding:3px;
  position:relative;
  min-height:0; overflow:hidden;
  transition:transform 0.15s;
}
.player-unit.fainted { opacity:0.25; filter:grayscale(1); }
.player-unit.attacking { animation:attackAnim 0.3s ease; }
.player-unit.hit { animation:hitAnim 0.3s ease; }

.player-img {
  flex:1; width:100%;
  display:flex; align-items:center; justify-content:center;
  min-height:0;
  position:relative;
  overflow:hidden;
  border-radius:4px;
  background:rgba(0,0,0,0.2);
}
.player-img img { width:100%; height:100%; object-fit:cover; border-radius:4px; }

.player-bars { width:100%; display:flex; flex-direction:column; gap:3px; flex-shrink:0; }
.player-hp-bar { width:100%; height:9px; background:#2b2118; border-radius:3px; overflow:hidden; }
.player-sp-bar { width:100%; height:7px; background:#2b2118; border-radius:2px; overflow:hidden; }
.player-skill-flash {
  position:absolute; top:0;left:0;right:0;bottom:0;
  background:rgba(255,255,255,0);
  pointer-events:none;
  border-radius:4px;
}

/* ===== ステータスバー（ゴールド・スタミナ・モード変更） ===== */
#status-bar {
  flex:0 0 auto;
  height:26px;
  background:#1c1712;
  border-bottom:1px solid #2a241c;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  font-size:11px;
  font-weight:bold;
  padding:0 8px;
}
#hub-btn {
  flex:0 0 auto;
  background:#332a1e; color:#f0d080;
  border:1px solid #4a3e2a; border-radius:6px;
  width:22px; height:20px;
  font-size:12px; line-height:1;
  cursor:pointer;
}
#status-mode-label { color:#c896ff; margin-right:auto; cursor:pointer; text-decoration:underline; text-decoration-style:dotted; }
#status-gold { color:#f0d080; }
#status-stamina { color:#7fd8ff; cursor:pointer; text-decoration:underline; text-decoration-style:dotted; }
#status-stamina.low { color:#ff7a6a; }
#status-player-lv { color:#c8b89a; cursor:pointer; text-decoration:underline; text-decoration-style:dotted; }

#status-toast {
  position:absolute; top:26px; left:50%; transform:translateX(-50%);
  background:#2b2118; border:1px solid #5a4838; border-radius:8px;
  padding:8px 14px; font-size:11px; color:#e9dfce; white-space:nowrap;
  z-index:80; display:none; box-shadow:0 4px 10px rgba(0,0,0,0.5);
}
#status-toast.show { display:block; }

/* ===== バトルモード選択ハブ ===== */
#hub-overlay {
  position:absolute; top:0; left:0; right:0; bottom:0;
  z-index:70;
  background:rgba(10,8,6,0.96);
  display:none;
  align-items:center; justify-content:center;
  padding:20px;
}
#hub-overlay.show { display:flex; }
#hub-box {
  width:100%; max-width:340px;
  display:flex; flex-direction:column; gap:12px;
}
#hub-title {
  text-align:center; font-size:18px; letter-spacing:3px; color:#f0d080;
  margin-bottom:6px;
}
.hub-mode-btn {
  display:flex; align-items:center; gap:14px;
  padding:14px 18px;
  border-radius:14px; border:1px solid #4a3e2a;
  background:#1c1712; color:#e9dfce;
  cursor:pointer; text-align:left;
}
.hub-mode-icon { font-size:26px; flex:0 0 auto; width:32px; text-align:center; }
.hub-mode-text { font-size:14px; font-weight:bold; letter-spacing:1px; }
.hub-mode-desc { display:block; font-size:10px; font-weight:normal; color:#8a7c64; margin-top:3px; letter-spacing:0; }
#hub-quest  { border-color:#c89858; }
#hub-dungeon{ border-color:#c896ff; }
#hub-arena  { border-color:#f0a840; background:linear-gradient(180deg,#3a2a12,#241a0c); }
#hub-free   { border-color:#4dc8ff; }
.hub-mode-btn.locked { opacity:0.55; }
.hub-mode-btn.locked .hub-mode-desc { color:#ff8866; }
#hub-title-link {
  display:block; text-align:center; margin-top:8px;
  color:#8a7c64; font-size:11px; text-decoration:underline;
}

/* ===== クエスト：ステージ選択グリッド ===== */
#quest-stage-overlay {
  position:absolute; top:0; left:0; right:0; bottom:0;
  z-index:69;
  background:rgba(10,8,6,0.97);
  display:none;
  align-items:center; justify-content:center;
  padding:20px;
}
#quest-stage-overlay.show { display:flex; }
#quest-stage-box { width:100%; max-width:340px; }
#quest-stage-title {
  text-align:center; font-size:16px; letter-spacing:2px; color:#f0d080;
  margin-bottom:14px;
}
#quest-stage-grid {
  display:grid; grid-template-columns:repeat(5,1fr); gap:8px;
  margin-bottom:16px;
}
.stage-select-node {
  aspect-ratio:1; border-radius:10px; border:2px solid #4a3e2a;
  background:#332a1e; color:#8a7c64;
  font-size:13px; font-weight:bold;
  cursor:pointer;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
}
.stage-node-num { font-size:14px; }
.stage-node-cost { font-size:9px; font-weight:normal; color:#7fd8ff; }
.stage-select-node.unlocked { background:#3a2e1a; border-color:#d4a843; color:#f0d080; }
.stage-select-node.unlocked .stage-node-cost { color:#7fd8ff; }
.stage-select-node.cleared { background:#1e3a1e; border-color:#70e070; color:#c8f0c8; }
.stage-select-node.cleared .stage-node-cost { color:#8fd8a8; }
.stage-select-node.locked { color:#4a4238; cursor:not-allowed; opacity:0.6; }
#quest-stage-back {
  display:block; width:100%; padding:10px; text-align:center;
  background:#332a1e; color:#c8b89a; border:1px solid #4a3e2a; border-radius:8px;
  font-size:12px; cursor:pointer;
}

/* ===== ステージ進行パス（パズドラ風・3階層ノード） ===== */
#stage-path {
  flex:0 0 auto;
  display:none;
  align-items:center; justify-content:center;
  gap:6px;
  padding:6px 10px;
  background:#141009;
  border-bottom:2px solid #3a3026;
}
#stage-path.show { display:flex; }
.stage-node {
  width:26px; height:26px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:bold;
  background:#332a1e; border:2px solid #4a3e2a; color:#5c5248;
}
.stage-node.cleared { background:#2e5a2e; border-color:#70e070; color:#c8f0c8; }
.stage-node.current { background:#5a3e28; border-color:#f0d080; color:#f0d080; box-shadow:0 0 8px rgba(240,208,128,0.5); }
.stage-line { width:18px; height:2px; background:#3a3026; }
.stage-line.cleared { background:#70e070; }

/* ===== ダンジョン選択バー（ダンジョンモードのみ） ===== */
#dungeon-bar {
  flex:0 0 auto;
  display:none;
  align-items:center;
  gap:6px;
  padding:5px 10px;
  background:#141009;
  border-bottom:2px solid #3a3026;
  overflow-x:auto;
}
#dungeon-bar.show { display:flex; }
.dungeon-btn {
  flex:0 0 auto;
  padding:5px 10px;
  border-radius:12px; border:1px solid #4a3e2a;
  background:#332a1e; color:#c8b89a;
  font-size:11px; font-weight:bold;
  cursor:pointer; white-space:nowrap;
}
.dungeon-btn.active { background:#4a2e6a; border-color:#c896ff; color:#e8d0ff; }
.dungeon-label {
  flex:0 0 auto; font-size:10px; color:#8a7c64; padding-right:2px;
}

/* ===== 難易度選択バー ===== */
#difficulty-bar {
  flex:0 0 auto;
  display:none;
  align-items:center;
  gap:5px;
  padding:5px 10px;
  background:#211c14;
  border-bottom:2px solid #3a3026;
  overflow-x:auto;
}
#difficulty-bar.show { display:flex; }
.diff-btn {
  flex:0 0 auto;
  min-width:34px;
  padding:5px 8px;
  border-radius:10px; border:1px solid #4a3e2a;
  background:#332a1e; color:#8a7c64;
  font-size:11px; font-weight:bold;
  cursor:pointer; white-space:nowrap;
  display:flex; flex-direction:column; align-items:center; gap:1px;
}
.diff-btn .diff-cost { font-size:9px; font-weight:normal; color:#7fd8ff; }
.diff-btn.active { background:#6a3e1e; border-color:#f0a840; color:#ffcf80; }
.diff-btn.active .diff-cost { color:#ffdca0; }
.diff-btn.locked { color:#4a4238; opacity:0.5; cursor:not-allowed; }

/* ===== コマンドボタン ===== */
#command-bar {
  flex:0 0 auto;
  height:52px;
  background:#211c14;
  border-top:2px solid #3a3026;
  display:flex;
  align-items:center;
  justify-content:space-around;
  padding:6px 10px;
  gap:6px;
}

.cmd-btn {
  flex:1;
  height:100%;
  border-radius:24px;
  border:none;
  font-size:13px;
  font-weight:bold;
  letter-spacing:1px;
  cursor:pointer;
  transition:all 0.15s;
}
.cmd-btn:active { transform:scale(0.95); }

#btn-attack { background:linear-gradient(180deg,#e07040,#c04820); color:#fff; }
#btn-skill  { background:linear-gradient(180deg,#4080e0,#2050c0); color:#fff; }
#btn-run    { background:linear-gradient(180deg,#505050,#303030); color:#ccc; }
#btn-auto   { background:linear-gradient(180deg,#d4a843,#a07820); color:#1a1410; }
#btn-auto.active { background:linear-gradient(180deg,#60e060,#30a030); color:#fff; }

.cmd-btn.grayed {
  background:linear-gradient(180deg,#3a3a3a,#222) !important;
  color:#666 !important;
  cursor:not-allowed;
}

/* ===== スキル選択メニュー ===== */
#skill-menu-overlay {
  position:absolute; top:0; left:0; right:0; bottom:0;
  background:rgba(8,6,4,0.4);
  display:none; align-items:flex-end; justify-content:center;
  z-index:60;
}
#skill-menu-overlay.show { display:flex; }
#skill-menu-box {
  width:100%; max-width:420px;
  background:#2b2118; border-top:2px solid #d4a843;
  border-radius:14px 14px 0 0;
  padding:14px 14px 20px;
  display:flex; flex-direction:column; gap:8px;
}
#skill-menu-title { color:#f0d080; font-size:13px; letter-spacing:2px; margin-bottom:4px; text-align:center; }
.skill-menu-item {
  display:flex; justify-content:space-between; align-items:center;
  background:#332a1e; border:1px solid #3a3026; border-radius:8px;
  padding:10px 12px; cursor:pointer; text-align:left;
}
.skill-menu-item:disabled, .skill-menu-item.disabled {
  opacity:0.4; cursor:not-allowed;
}
.skill-menu-item .sk-name { color:#f0d080; font-size:13px; font-weight:bold; }
.skill-menu-item .sk-desc { color:#8a7c64; font-size:10px; margin-top:2px; }
.skill-menu-item .sk-sp { color:#4dc8ff; font-size:12px; font-weight:bold; white-space:nowrap; margin-left:8px; }
#skill-menu-cancel {
  margin-top:4px; padding:10px; border-radius:8px; border:1px solid #5a4838;
  background:#2e2a22; color:#c8b89a; font-size:12px; cursor:pointer;
}

/* ===== アニメーション ===== */
@keyframes attackAnim {
  0%{transform:scale(1);}50%{transform:scale(1.1);}100%{transform:scale(1);}
}
@keyframes hitAnim {
  0%{transform:translateX(0);}25%{transform:translateX(-5px);}75%{transform:translateX(5px);}100%{transform:translateX(0);}
}
@keyframes skillHitAnim {
  0%{transform:scale(1);}30%{transform:scale(0.9);}60%{transform:scale(1.05);}100%{transform:scale(1);}
}

/* ダメージポップアップ（#fx-layer内に絶対配置。left/topはJSでユニット座標を指定） */
.dmg-popup {
  position:absolute;
  transform:translate(-50%, 0) scale(1);
  font-size:22px; font-weight:900; color:#fff;
  pointer-events:none; white-space:nowrap;
  animation:popupAnim 1.4s cubic-bezier(0.2,0.8,0.3,1) forwards;
  text-shadow:-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000,1px 1px 0 #000,0 2px 8px rgba(0,0,0,0.9);
}
.dmg-popup.skill-pop { color:#ffdc70; font-size:20px; }
.dmg-popup.buff-pop  { color:#88e0ff; font-size:16px; }
@keyframes popupAnim {
  0%  {opacity:0;   transform:translate(-50%,4px)   scale(0.5);}
  12% {opacity:1;   transform:translate(-50%,-14px) scale(1.3);}
  28% {opacity:1;   transform:translate(-50%,-20px) scale(1);}
  75% {opacity:1;   transform:translate(-50%,-40px) scale(1);}
  100%{opacity:0;   transform:translate(-50%,-52px) scale(0.92);}
}

/* 全画面のダメージ演出専用レイヤー（各ユニットのoverflow設定に影響されない） */
#fx-layer {
  position:absolute; top:0; left:0; right:0; bottom:0;
  pointer-events:none; z-index:40;
}

/* 結果オーバーレイ */
#result-overlay {
  position:absolute; top:0;left:0;right:0;bottom:0;
  background:rgba(8,6,4,0.95);
  display:none; flex-direction:column;
  align-items:center; justify-content:center; gap:12px; z-index:50;
  padding:20px;
}
#result-overlay.show { display:flex; }
#result-title { font-size:32px; font-weight:bold; letter-spacing:4px; text-shadow:0 0 24px currentColor; }
#result-subtitle { color:#c8b89a; font-size:13px; letter-spacing:1px; }

#result-stats {
  background:#332a1e;
  border:1px solid #5a4838;
  border-radius:10px;
  padding:14px 24px;
  display:flex; flex-direction:column; gap:8px;
  width:100%;
  max-width:280px;
}
.result-stat-row {
  display:flex; justify-content:space-between; align-items:center;
  color:#c8b89a; font-size:13px;
}
.result-stat-row span { color:#f0d080; font-weight:bold; }

#result-next-btn {
  background:linear-gradient(180deg,#d4a843,#a07820);
  border:none; color:#1a1410;
  padding:13px 32px; font-size:15px; font-weight:bold;
  letter-spacing:2px; border-radius:8px; cursor:pointer;
  width:100%; max-width:280px;
}
#result-next-label {
  color:#8a7c64; font-size:11px; letter-spacing:1px; text-align:center;
}

/* ===== 対人戦マッチングプレビュー ===== */
#matchup-overlay {
  position:absolute; top:0;left:0;right:0;bottom:0;
  background:rgba(8,6,4,0.97);
  display:none; flex-direction:column;
  align-items:center; justify-content:center; gap:14px; z-index:55;
  padding:20px;
}
#matchup-overlay.show { display:flex; }
#matchup-title { color:#f0d080; font-size:16px; font-weight:bold; letter-spacing:2px; }
#matchup-teams { width:100%; display:flex; flex-direction:column; gap:10px; }
.matchup-side-label { color:#8a7c64; font-size:11px; margin-bottom:4px; letter-spacing:1px; }
.matchup-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:4px; }
.matchup-card {
  aspect-ratio:1; background:#332a1e; border:1px solid #3a3026; border-radius:6px;
  overflow:hidden; position:relative;
}
.matchup-card img { width:100%; height:100%; object-fit:cover; display:block; }
.matchup-card .elem-fallback { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:24px; }
.matchup-card .matchup-lv {
  position:absolute; left:0; right:0; bottom:0; font-size:7px; color:#fff; text-align:center;
  background:rgba(0,0,0,0.6); padding:1px 0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.matchup-vs { text-align:center; color:#ff9a4a; font-size:15px; font-weight:bold; letter-spacing:2px; }
.matchup-name-row {
  display:flex; align-items:baseline; justify-content:center; gap:10px;
  background:#332a1e; border:1px solid #3a3026; border-radius:10px; padding:16px;
}
.matchup-name { color:#f0d080; font-size:16px; font-weight:bold; }
.matchup-name-lv { color:#8a7c64; font-size:13px; }
#matchup-fight-btn {
  background:linear-gradient(180deg,#d4a843,#a07820);

    { v: 1.3, w: 8 }, { v: 1.4, w: 4 }, { v: 1.5, w: 3 },
  ];
  function rollOneStat() {
    const r = Math.random() * 100;
    let acc = 0;
    for (const e of INDIVIDUALITY_TABLE) { acc += e.w; if (r < acc) return e.v; }
    return 1.0;
  }
  // 「厳選当たり」発生時、1.5倍になるステータスの個数（1〜4）の抽選テーブル
  const PERFECT_COUNT_TABLE = [
    { n: 1, w: 50 }, { n: 2, w: 30 }, { n: 3, w: 15 }, { n: 4, w: 5 },
  ];
  function rollPerfectStatCount() {
    const r = Math.random() * 100;
    let acc = 0;
    for (const e of PERFECT_COUNT_TABLE) { acc += e.w; if (r < acc) return e.n; }
    return 1;

  function getCharacterMaster(id) {
    return CHARACTER_MASTER.find((c) => c.id === id) || null;
  }

  // ============================================================
  // セーブデータ（localStorage）
  // ============================================================
  const STORAGE_KEYS = {
    inventory: 'kaseki_inventory',   // 所持キャラ一覧（発掘で獲得した個体）
    gold: 'kaseki_gold',
    party: 'kaseki_party',           // 編成中のuid配列（最大3）
    stones: 'kaseki_rocks',          // 「岩」の所持数（旧形式・移行元）
    rocksV2: 'kaseki_rocks_v2',       // 「岩」タイプ別所持数
    awakenMaterials: 'kaseki_awaken_materials', // 覚醒石の所持数（属性ごと）
    playerLevel: 'kaseki_player_level',
    playerExp: 'kaseki_player_exp',
    stamina: 'kaseki_stamina',
    staminaTs: 'kaseki_stamina_ts',  // 最後にスタミナを計算した時刻(ms)
    rating: 'kaseki_rating',         // 闘技場レート
    questUnlock: 'kaseki_quest_unlock',     // 解放済みクエストステージ(最大値)
    dungeonUnlock: 'kaseki_dungeon_unlock', // 解放済みダンジョン難易度({種別:属性 -> 最大値})
    starterGranted: 'kaseki_starter_granted', // 初回スターター(各属性コモン1体)付与済みフラグ
    gem: 'kaseki_gem',               // 課金通貨ジェムの所持数
    staminaTicket: 'kaseki_stamina_ticket', // 即時全回復チケットの所持数
    monthlyPass: 'kaseki_monthly_pass',     // 月額パスの状態
    purchaseCounts: 'kaseki_purchase_counts', // 回数限定商品の購入回数
    spentYen: 'kaseki_spent_yen', // テストプレイ用：累計課金額（円）の自己申告カウンタ
  };

  function loadInventory() {
    try {
      const raw = localStorage.getItem(STORAGE_KEYS.inventory);
      return raw ? JSON.parse(raw) : [];
    } catch (e) {
      return [];
    }
  }

  function saveInventory(list) {
    localStorage.setItem(STORAGE_KEYS.inventory, JSON.stringify(list));
  }

  /**
   * 発掘完了時に呼ぶ：新しいキャラ個体をインベントリに追加する
   * @param {string} charId - CHARACTER_MASTERのid
   * @param {string} digGrade - 'S'|'A'|'B'|'C'|'D'
   * @returns {object} 追加された個体データ
   */
  function addCharacterToInventory(charId, digGrade, forcePerfect) {
    const master = getCharacterMaster(charId);
    if (!master) throw new Error('Unknown character id: ' + charId);
    const individuality = rollIndividuality(!!forcePerfect);
    const instance = {
      uid: 'inst_' + Date.now() + '_' + Math.floor(Math.random() * 100000),
      charId,
      digGrade,
      individuality,
      level: 1,
      obtainedAt: Date.now(),
    };
    const inv = loadInventory();
    inv.push(instance);
    saveInventory(inv);
    return instance;
  }

  // 初回プレイ時のみ：各属性のCOMMON個体を1体ずつ自動付与する（各属性の雰囲気を最初から確認できるように）
  const STARTER_CHAR_IDS = ['fire01', 'water01', 'earth01']; // テストプレイ用：火・水・土の3属性コモン1体ずつ（本番は5属性に戻す想定）
  function grantStarterCharactersIfFirstTime() {
    if (localStorage.getItem(STORAGE_KEYS.starterGranted)) return false;
    const inv = loadInventory();
    if (inv.length > 0) {
      // すでに何らかの所持キャラがいる場合は「初回」とは見なさず、何もしない
      localStorage.setItem(STORAGE_KEYS.starterGranted, '1');
      return false;
    }
    STARTER_CHAR_IDS.forEach(id => addCharacterToInventory(id, 'B'));
    localStorage.setItem(STORAGE_KEYS.starterGranted, '1');
    return true;
  }

  /**
   * 強化倍率（16章改訂版）：レベル帯ごとに伸び率が加速するバンド制
   * Lv1〜50は強化のみで到達可能（約×3.0）。Lv51以降は覚醒で上限を+10ずつ解放しないと入れない領域で、
   * 伸び率はLv41〜50と同じ+6%/Lvを維持（これ以上は加速させず、覚醒側のボーナスで伸ばす設計）
   */
  const STRENGTHEN_BANDS = [
    { from: 2,   to: 10,  rate: 0.02 }, // Lv2〜10：+2%/Lv（+18%）
    { from: 11,  to: 20,  rate: 0.03 }, // Lv11〜20：+3%/Lv（+30%）
    { from: 21,  to: 30,  rate: 0.04 }, // Lv21〜30：+4%/Lv（+40%）
    { from: 31,  to: 40,  rate: 0.05 }, // Lv31〜40：+5%/Lv（+50%）
    { from: 41,  to: 50,  rate: 0.06 }, // Lv41〜50：+6%/Lv（+60%）※強化単体の上限はここ
    { from: 51,  to: 60,  rate: 0.06 }, // 覚醒1後：+6%/Lv（+60%）
    { from: 61,  to: 70,  rate: 0.06 }, // 覚醒2後：+6%/Lv（+60%）
    { from: 71,  to: 80,  rate: 0.06 }, // 覚醒3後：+6%/Lv（+60%）
    { from: 81,  to: 90,  rate: 0.06 }, // 覚醒4後：+6%/Lv（+60%）
    { from: 91,  to: 100, rate: 0.06 }, // 覚醒5後：+6%/Lv（+60%）
  ];
  function getStrengthenBandBonus(lv) {
    let bonus = 0;
    for (const band of STRENGTHEN_BANDS) {
      if (lv < band.from) break;
      const upper = Math.min(lv, band.to);
      bonus += (upper - band.from + 1) * band.rate;
    }
    return bonus; // Lv50で+1.98(≒×3)、Lv100(覚醒5込み)で+4.98(≒×6)
  }

  // --- 覚醒 ---
  // 覚醒1回につきステータス+25%（強化ボーナスとは同じ枠で加算＝掛け算の暴走を防ぐ設計）
  const AWAKEN_STAT_BONUS = 0.25;
  const AWAKEN_MAX_COUNT = 5;
  const BASE_LEVEL_CAP = 50;
  function getMaxLevelCap(awakenCount) {
    return Math.min(100, BASE_LEVEL_CAP + (awakenCount || 0) * 10);
  }
  function getAwakenBonus(awakenCount) {
    return (awakenCount || 0) * AWAKEN_STAT_BONUS; // 5回で+125%
  }
  // 覚醒に必要なゴールド・専用素材（素材は対象キャラの属性の「覚醒石」、ダンジョン産）
  // 段階が上がるほどゴールド・素材ともに要求量が増える
  const AWAKEN_REQUIREMENTS = [
    { gold: 5000,  material: 3 },  // 1覚醒目：Lv50到達が条件
    { gold: 12000, material: 5 },  // 2覚醒目：Lv60到達が条件
    { gold: 25000, material: 8 },  // 3覚醒目：Lv70到達が条件
    { gold: 45000, material: 12 }, // 4覚醒目：Lv80到達が条件
    { gold: 75000, material: 18 }, // 5覚醒目：Lv90到達が条件
  ];
  function getAwakenRequirement(nextAwakenCount) {
    return AWAKEN_REQUIREMENTS[nextAwakenCount - 1] || null;
  }
  // レベル帯が上がる（＝覚醒で解放した領域に入る）ほど1レベルあたりのゴールドコストも増加
  const STRENGTHEN_COST_TIER_MUL = [1, 1.5, 2.0, 2.5, 3.0, 3.5]; // [Lv1-50, 51-60, 61-70, 71-80, 81-90, 91-100]
  function getStrengthenCostTierMul(lv) {
    if (lv <= 50) return STRENGTHEN_COST_TIER_MUL[0];
    const tier = Math.min(5, Math.ceil((lv - 50) / 10));
    return STRENGTHEN_COST_TIER_MUL[tier];
  }

  /**
   * 所持個体の最終ステータスを計算する
   * 最終ステータス = 基礎値 × レアリティ補正 × 個体差倍率 × 発掘評価補正 × (1 + 強化ボーナス + 覚醒ボーナス)
   * @param {object} instance - loadInventory()の要素
   * @param {number} [titleDungeonDifficulty] - 称号ダンジョン挑戦時のみ、HPに難易度倍率をかける
   */
  function calculateInstanceStats(instance, titleDungeonDifficulty) {
    const master = getCharacterMaster(instance.charId);
    if (!master) return null;
    const rarityMul = RARITY_MUL[master.rarity] || 1.0;
    const digMul = DIG_GRADE_MUL[instance.digGrade] || 1.0;
    const ind = instance.individuality || { hp: 1, atk: 1, def: 1, spd: 1 };
    const lv = instance.level || 1;
    const awakenCount = instance.awakenCount || 0;
    const strengthenMul = 1 + getStrengthenBandBonus(lv) + getAwakenBonus(awakenCount);
    const hpDiffMul = master.rarity === 'title' && titleDungeonDifficulty
      ? (TITLE_DUNGEON_HP_MUL[titleDungeonDifficulty] || 1)
      : 1;
    const b = master.baseStats;
    return {
      hp: Math.round(b.hp * rarityMul * ind.hp * digMul * strengthenMul * hpDiffMul),
      atk: Math.round(b.atk * rarityMul * ind.atk * digMul * strengthenMul),
      def: Math.round(b.def * rarityMul * ind.def * digMul * strengthenMul),
      spd: Math.round(b.spd * rarityMul * ind.spd * digMul * strengthenMul),
      sp: Math.round((b.sp || 100) * rarityMul * strengthenMul), // 最大SPはキャラごとの基礎値×レアリティ補正×強化・覚醒倍率（レベル強化でも伸びるように）
    };
  }

  // --- プレイヤーレベル（スタミナ上限に影響、Lv100が上限） ---
  const PLAYER_LEVEL_CAP = 100;
  const STAMINA_START = 20;   // 初期スタミナ上限（プレイヤーLv1時点）
  const STAMINA_MAX_CAP = 300; // スタミナ上限の絶対最大値（Lv100到達で到達）
  const STAMINA_PER_LEVEL = (STAMINA_MAX_CAP - STAMINA_START) / (PLAYER_LEVEL_CAP - 1); // Lv1→100で20→300になるよう均等割り（約2.83/Lv）
  const STAMINA_REGEN_MS = 5 * 60 * 1000; // 5分で1回復
  const PLAYER_EXP_PER_LEVEL = 50; // Lvごとに必要EXPが+50ずつ増える(Lv1→2は50, Lv2→3は100…)

  function getPlayerLevel() {
    return parseInt(localStorage.getItem(STORAGE_KEYS.playerLevel) || '1', 10);
  }
  function getPlayerExp() {
    return parseInt(localStorage.getItem(STORAGE_KEYS.playerExp) || '0', 10);
  }
  function getExpToNextLevel(level) {
    return level * PLAYER_EXP_PER_LEVEL;
  }
  function getMaxStamina(level) {
    const lv = Math.min(PLAYER_LEVEL_CAP, level || getPlayerLevel());
    return Math.round(Math.min(STAMINA_MAX_CAP, STAMINA_START + (lv - 1) * STAMINA_PER_LEVEL));
  }
  // プレイヤーEXPを加算し、必要ならレベルアップさせる（複数レベル分一気に上がるケースも考慮。Lv100でカンスト）
  function addPlayerExp(amount) {
    let level = getPlayerLevel();
    if (level >= PLAYER_LEVEL_CAP) {
      return { level: PLAYER_LEVEL_CAP, exp: 0, leveledUp: false }; // カンスト済みはEXPを受け取らない
    }
    let exp = getPlayerExp() + amount;
    let leveledUp = false;
    let stamBonus = 0; // レベルアップごとの「そのレベルのMAX値」を丸ごと積み上げる
    while (level < PLAYER_LEVEL_CAP && exp >= getExpToNextLevel(level)) {
      exp -= getExpToNextLevel(level);
      level += 1;
      leveledUp = true;
      stamBonus += getMaxStamina(level); // 差分ではなく、そのレベル時点のMAX値をまるごと加算
    }
    if (level >= PLAYER_LEVEL_CAP) {
      level = PLAYER_LEVEL_CAP;
      exp = 0; // カンスト到達時は端数EXPを切り捨てて0にする
    }
    localStorage.setItem(STORAGE_KEYS.playerLevel, String(level));
    localStorage.setItem(STORAGE_KEYS.playerExp, String(exp));
    if (leveledUp) {
      // 残っていたスタミナ＋新MAX値をそのまま加算（上限を超えるオーバーフローも許容する）
      const stam = getStamina();
      setStaminaRaw(stam + stamBonus);
    }
    return { level, exp, leveledUp };
  }

  // --- スタミナ ---
  function setStaminaRaw(v) {
    localStorage.setItem(STORAGE_KEYS.stamina, String(Math.max(0, Math.round(v))));

  }
  // 経過時間分のスタミナ自然回復を計算してから現在値を返す
  // ※レベルアップ直後などで上限を超えている場合はそのオーバーフローをそのまま維持する（自然減少で消費されるまで残る）
  function getStamina() {
    const max = getMaxStamina();
    const rawStam = localStorage.getItem(STORAGE_KEYS.stamina);
    const rawTs = localStorage.getItem(STORAGE_KEYS.staminaTs);
    if (rawStam === null || rawTs === null) {
      setStaminaRaw(STAMINA_START);
      return STAMINA_START;
    }
    let stam = parseInt(rawStam, 10);
    const ts = parseInt(rawTs, 10);
    if (stam >= max) {
      return stam; // 上限以上ならそのまま返す（減算するまでオーバーフローを保持）
    }
    const elapsedMs = Date.now() - ts;
    const regen = Math.floor(elapsedMs / STAMINA_REGEN_MS);
    if (regen > 0) {
      stam = Math.min(max, stam + regen);
      const remainderTs = ts + regen * STAMINA_REGEN_MS;
      localStorage.setItem(STORAGE_KEYS.stamina, String(stam));
      localStorage.setItem(STORAGE_KEYS.staminaTs, String(remainderTs));
    }
    return stam;
  }
  function getMsToNextStamina() {
    const max = getMaxStamina();
    const stam = getStamina();
    if (stam >= max) return 0;
    const ts = parseInt(localStorage.getItem(STORAGE_KEYS.staminaTs) || String(Date.now()), 10);
    return Math.max(0, STAMINA_REGEN_MS - (Date.now() - ts));
  }
  function hasEnoughStamina(cost) {

  // スタミナを消費する。足りなければ何もせずfalseを返す

    setStaminaRaw(cur - cost);
    return true;
  }

  // --- 強化 ---
  function goldToNextLevel(currentLevel, awakenCount) {
    const cap = getMaxLevelCap(awakenCount || 0);

  function strengthenInstance(uid) {
    const inv = loadInventory();
    const inst = inv.find((i) => i.uid === uid);
    if (!inst) return { ok: false, reason: 'not_found' };
    const cost = goldToNextLevel(inst.level, inst.awakenCount || 0);
    if (cost === null) return { ok: false, reason: 'max_level' };
    if (getGold() < cost) return { ok: false, reason: 'not_enough_gold' };
    addGold(-cost);
    inst.level += 1;

    return { ok: true, newLevel: inst.level, spentGold: cost };

  /**
   * 覚醒を実行する。条件：現在の覚醒段階の上限レベルまで強化済み、かつゴールド・専用素材が足りていること
   */
  function awakenInstance(uid) {
    const inv = loadInventory();
    const inst = inv.find((i) => i.uid === uid);
    if (!inst) return { ok: false, reason: 'not_found' };
    const master = getCharacterMaster(inst.charId);
    if (!master) return { ok: false, reason: 'not_found' };
    const cur = inst.awakenCount || 0;
    if (cur >= AWAKEN_MAX_COUNT) return { ok: false, reason: 'max_awaken' };
    const requiredLevel = getMaxLevelCap(cur);
    if ((inst.level || 1) < requiredLevel) {
      return { ok: false, reason: 'level_not_maxed', requiredLevel };
    }
    const req = getAwakenRequirement(cur + 1);
    if (!req) return { ok: false, reason: 'no_requirement_data' };
    if (getGold() < req.gold) return { ok: false, reason: 'not_enough_gold', need: req.gold };
    const materialKey = master.element || 'title';
    const haveMaterial = getAwakenMaterialCount(materialKey);
    if (haveMaterial < req.material) {
      return { ok: false, reason: 'not_enough_material', need: req.material, have: haveMaterial, element: materialKey };
    }
    addGold(-req.gold);
    addAwakenMaterial(materialKey, -req.material);
    inst.awakenCount = cur + 1;
    saveInventory(inv);
    return {
      ok: true,
      newAwakenCount: inst.awakenCount,
      newLevelCap: getMaxLevelCap(inst.awakenCount),
      spentGold: req.gold,
      spentMaterial: req.material,
    };
  }

  // ============================================================
  // ダメージ計算（10章のダメージ計算式）
  // ============================================================
  const CRIT_MUL = 1.5; // 急所倍率。急所は称号キャラの技でのみ発生(基準0%)
  function calculateDamage(power, atk, def, atkElement, defElement, targetMul, atkRarity, defRarity, critRate) {
    const eff = getTypeMultiplier(atkElement, defElement, atkRarity, defRarity);
    const rng = 0.85 + Math.random() * 0.15;
    const isCrit = (critRate || 0) > 0 && Math.random() < critRate;
    const critMul = isCrit ? CRIT_MUL : 1.0;
    const raw = power * (targetMul || 1.0) * (atk / def) * eff * critMul * rng;
    return { dmg: Math.max(1, Math.round(raw)), eff, isCrit };
  }

<script>
// ========================================================
// 定数（game-data.jsのGameDataを参照。表示用の別名だけここで用意）
// ========================================================
const TYPE_CHART   = GameData.TYPE_CHART;
const ELEM_ICONS   = GameData.ELEM_ICONS;
const ELEM_COLORS  = GameData.ELEM_COLORS;
const RARITY_MUL   = GameData.RARITY_MUL;
const TIER_POWER   = GameData.TIER_POWER;

// 属性ごとに紐づく追加効果（20章・16章）
// 正式な「状態異常」は火(やけど)・雷(まひ)・称号(混乱)のみ。水/土/風はステータス上昇/減少(段階制)をテーマにしており状態異常は持たない
const ELEMENT_STATUS = { fire: 'burn', thunder: 'paralysis' };
const STATUS_LABEL = { burn: 'やけど', paralysis: 'まひ', confusion: '混乱' };

// ========================================================
// バトル状態
// ========================================================
let playerTeam=[], opponentTeam=[];
let autoAdvanceTimer = null; // 階層クリア時の自動進行タイマー
let battleRunning=false, isAuto=true, battleSpeed=0.336; // 戦闘スピードを1.2倍に調整（0.28→0.336）
let battleUnresolved=false; // trueの間は「対戦中」として離脱時に確認を挟む（結果画面表示で解除）

// マスターデータ(id)から敵ファイターを構築（クエスト/対人戦用、個体差なしの素の性能）
function buildEnemyFighter(masterId, extraStatMul) {
  const master = GameData.getCharacterMaster(masterId);
  const m = RARITY_MUL[master.rarity] || 1;
  // ステージ/難易度倍率はHPだけでなく攻撃・防御・素早さにも同率で適用する
  // （HPのみ強化すると「硬いだけで弱い的」になり、レベル/構成を練らなくても時間をかければ勝ててしまうため）
  const statMul = extraStatMul || 1;
  const maxSp = Math.round((master.baseStats.sp || 100) * m);
  return {
    name: master.name, element: master.element, rarity: master.rarity, image: master.image,
    atk: Math.round(master.baseStats.atk * m * statMul),
    def: Math.round(master.baseStats.def * m * statMul),
    spd: Math.round(master.baseStats.spd * m * statMul),
    maxHp: Math.round(master.baseStats.hp * m * statMul),
    hp: Math.round(master.baseStats.hp * m * statMul),
    maxSp: maxSp, sp: maxSp,
    status: null, atkStage: 0, defStage: 0, spdStage: 0,
    skills: master.skills,
  };
}

// 所持キャラ（編成済みパーティ）からプレイヤーファイターを構築
function buildPlayerFighterFromInstance(def) {
  const maxSp = (def.stats && def.stats.sp) || 100;
  return {
    name: def.name, element: def.element, rarity: def.rarity, image: def.image,
    atk: def.stats.atk, def: def.stats.def, spd: def.stats.spd,
    maxHp: def.stats.hp, hp: def.stats.hp,
    maxSp: maxSp, sp: maxSp,
    status: null, atkStage: 0, defStage: 0, spdStage: 0,
    skills: def.skills,
  };
}

function getPlayerTeamDefs() {
  const party = GameData.getPartyAsFighterDefs();
  return party.map(buildPlayerFighterFromInstance); // 編成が空なら空配列のまま返す（架空のデモ編成で埋めない）
}

function stageMul(stage) {
  return 1 + 0.25 * Math.max(-3, Math.min(4, stage));
}

function effectiveAtk(f) {
  return f.atk * stageMul(f.atkStage);
}
function effectiveDef(f) {
  return f.def * stageMul(f.defStage);
}
function effectiveSpd(f) {
  return f.spd * stageMul(f.spdStage);
}
// 急所率：段階制(±25%/段階)、基準0%。称号キャラの技でのみ増減する
function effectiveCritRate(f) {
  const stage = Math.max(0, Math.min(4, f.critStage || 0));
  return Math.max(0, Math.min(1, stage * 0.25));
}

function getTypeEff(a, d) { return GameData.getTypeMultiplier(a, d); }

function calcDmg(power, atk, def, ae, de, targetMul, atkRarity, defRarity, critRate) {
  return GameData.calculateDamage(power, atk, def, ae, de, targetMul, atkRarity, defRarity, critRate);
}

// ========================================================
// 描画
// ========================================================
function hpClass(r){ return r<=0.2?'low':r<=0.5?'mid':'high'; }

// キャラ画像があればimgタグ、なければ属性絵文字にフォールバックして表示するHTMLを返す
function charIconHtml(f, size) {
  const fallbackFontSize = typeof size === 'number' ? `${size}px` : '32px';
  if (f.image) {
    return `<img src="${f.image}" alt="${f.name}" style="width:100%;height:100%;object-fit:cover;" onerror="this.replaceWith(Object.assign(document.createElement('span'),{style:'font-size:${fallbackFontSize};',textContent:'${ELEM_ICONS[f.element]||'?'}'}))">`;
  }
  return `<span style="font-size:${fallbackFontSize};">${ELEM_ICONS[f.element]||'?'}</span>`;
}

function renderEnemyField(){
  const el=document.getElementById('enemy-field');
  el.innerHTML='';
  opponentTeam.forEach((f,i)=>{
    const r=Math.max(0,f.hp/f.maxHp);
    const sp=Math.max(0,f.sp/f.maxSp);
    const div=document.createElement('div');
    div.className=`enemy-unit ${f.hp<=0?'fainted':''}`;
    div.id=`eu-${i}`;
    div.innerHTML=`
      <div class="enemy-img" id="eimg-${i}">
        <div class="status-badges" id="ebadge-${i}">${renderBadges(f)}</div>
        ${charIconHtml(f, 46)}
        <div class="skill-flash" id="eflash-${i}"></div>
      </div>
      <div class="enemy-bars">
        <div class="bar-row">
          <div class="enemy-hp-bar"><div class="hp-fill ${hpClass(r)}" id="ehp-${i}" style="width:${r*100}%;"></div></div>
          <span class="bar-num" id="ehpnum-${i}">${Math.round(f.hp)}/${Math.round(f.maxHp)}</span>
        </div>
        <div class="bar-row">
          <div class="enemy-sp-bar"><div class="sp-fill" id="esp-${i}" style="width:${sp*100}%;"></div></div>
          <span class="bar-num" id="espnum-${i}">${Math.round(f.sp)}/${Math.round(f.maxSp)}</span>
        </div>
      </div>
    `;
    el.appendChild(div);
  });
}

function renderPlayerField(){
  const el=document.getElementById('player-field');
  el.innerHTML='';
  playerTeam.forEach((f,i)=>{
    const r=Math.max(0,f.hp/f.maxHp);
    const sp=Math.max(0,f.sp/f.maxSp);
    const color=ELEM_COLORS[f.element]||'#999';
    const div=document.createElement('div');
    div.className=`player-unit ${f.hp<=0?'fainted':''}`;
    div.id=`pu-${i}`;
    div.innerHTML=`
      <div class="player-img" style="border-bottom:2px solid ${color}44;">
        <div class="status-badges" id="pbadge-${i}">${renderBadges(f)}</div>
        ${charIconHtml(f, 34)}
        <div class="player-skill-flash" id="pflash-${i}"></div>
      </div>
      <div class="player-bars">
        <div class="bar-row">
          <div class="player-hp-bar"><div class="hp-fill ${hpClass(r)}" id="php-${i}" style="width:${r*100}%;"></div></div>
          <span class="bar-num" id="phpnum-${i}">${Math.round(f.hp)}/${Math.round(f.maxHp)}</span>
        </div>
        <div class="bar-row">
          <div class="player-sp-bar"><div class="sp-fill" id="psp-${i}" style="width:${sp*100}%;"></div></div>
          <span class="bar-num" id="pspnum-${i}">${Math.round(f.sp)}/${Math.round(f.maxSp)}</span>
        </div>
      </div>
    `;
    el.appendChild(div);
  });
}

function renderAll(){ renderEnemyField(); renderPlayerField(); }

// バフ・デバフ・状態異常をキャラアイコンに重ねて表示するバッジHTMLを生成
const STATUS_BADGE_MAP = {
  burn:     ['🔥', 'ailment-badge'],
  paralysis:['⚡', 'ailment-badge'],
  confusion:['💫', 'ailment-badge'],
  atkDown:  ['A↓', 'debuff-badge'],
  defDown:  ['D↓', 'debuff-badge'],
  spdDown:  ['S↓', 'debuff-badge'],
};
function renderBadges(f){
  let html = '';
  if (f.status) {
    const [label, cls] = STATUS_BADGE_MAP[f.status] || [f.status, 'debuff-badge'];
    html += `<span class="stbadge ${cls}">${label}</span>`;
  }
  const stageChip = (abbr, val) => {
    if (!val) return '';
    const cls = val > 0 ? 'buff-badge' : 'debuff-badge';
    return `<span class="stbadge ${cls}">${abbr}${val > 0 ? '↑' : '↓'}${Math.abs(val)}</span>`;
  };
  html += stageChip('A', f.atkStage);
  html += stageChip('D', f.defStage);
  html += stageChip('S', f.spdStage);
  return html;
}
function updateStatusBadges(isPlayer, idx, f){
  const el = document.getElementById(`${isPlayer ? 'pbadge' : 'ebadge'}-${idx}`);
  if (el) el.innerHTML = renderBadges(f);
}

function updateBars(isPlayer,idx,f){
  const pre=isPlayer?'p':'e';
  const hp=document.getElementById(`${pre}hp-${idx}`);
  const sp=document.getElementById(`${pre}sp-${idx}`);
  if(!hp) return;
  const r=Math.max(0,f.hp/f.maxHp);
  hp.style.width=`${r*100}%`;
  hp.className='hp-fill '+hpClass(r);
  if(sp) sp.style.width=`${Math.max(0,f.sp/f.maxSp*100)}%`;
  const hpNum=document.getElementById(`${pre}hpnum-${idx}`);
  if(hpNum) hpNum.textContent=`${Math.max(0,Math.round(f.hp))}/${Math.round(f.maxHp)}`;
  const spNum=document.getElementById(`${pre}spnum-${idx}`);
  if(spNum) spNum.textContent=`${Math.max(0,Math.round(f.sp))}/${Math.round(f.maxSp)}`;
}

function popup(isPlayer,idx,text,cls){
  const id=isPlayer?`pu-${idx}`:`eu-${idx}`;
  const unit=document.getElementById(id);
  const layer=document.getElementById('fx-layer');
  const screen=document.getElementById('battle-screen');
  if(!unit||!layer||!screen) return;
  const uRect=unit.getBoundingClientRect();
  const sRect=screen.getBoundingClientRect();
  const x=uRect.left - sRect.left + uRect.width/2;
  const y=uRect.top - sRect.top;
  const p=document.createElement('div');
  p.className=`dmg-popup ${cls||''}`;
  p.textContent=text;
  p.style.left=`${x}px`;
  p.style.top=`${y}px`;
  layer.appendChild(p);
  setTimeout(()=>p.remove(),1400);
}

function flash(isPlayer,idx){
  const id=isPlayer?`pflash-${idx}`:`eflash-${idx}`;
  const el=document.getElementById(id);
  if(!el) return;
  el.style.background='rgba(255,255,255,0.75)';
  setTimeout(()=>{ el.style.transition='background 0.35s'; el.style.background='rgba(255,255,255,0)'; },80);
  setTimeout(()=>{ el.style.transition=''; },430);
}

function animHit(isPlayer,idx){
  const id=isPlayer?`pu-${idx}`:`eu-${idx}`;
  const el=document.getElementById(id);
  if(!el) return;
  el.classList.remove('hit','skill-target');
  void el.offsetWidth;
  el.classList.add(isPlayer?'hit':'skill-target');
  setTimeout(()=>el.classList.remove('hit','skill-target'),400);
}

function animAttack(isPlayer,idx){
  const id=isPlayer?`pu-${idx}`:`eu-${idx}`;
  const el=document.getElementById(id);
  if(!el) return;
  el.classList.remove('attacking');
  void el.offsetWidth;
  el.classList.add('attacking');
  setTimeout(()=>el.classList.remove('attacking'),300);
}

function setLog(t){ document.getElementById('log-text').textContent=t; }

const STAT_NAME = { atk: '攻撃力', def: '防御力', spd: '素早さ' };

function describeSkill(skill) {
  const targetLabel = skill.targets === 'all' ? '敵全体' : skill.targets === 0 ? '自分' : `敵${skill.targets}体`;
  const parts = [];
  if (skill.tier) parts.push(`${targetLabel}に${skill.tier}ダメージ`);

  skill.effects.forEach(effect => {
    if (effect.type === 'status') {
      const label = STATUS_LABEL[effect.status] || effect.status;
      const chance = effect.chance >= 1 ? '確定で' : `${Math.round(effect.chance * 100)}%で`;
      parts.push(`${chance}${label}付与`);
    } else if (effect.type === 'buff') {
      parts.push(`自身の${STAT_NAME[effect.stat] || effect.stat}上昇`);
    } else if (effect.type === 'debuff') {
      const who = effect.target === 'enemyAll' ? '敵全体' : targetLabel;
      const chance = effect.chance >= 1 ? '確定で' : `${Math.round(effect.chance * 100)}%で`;
      parts.push(`${chance}${who}の${STAT_NAME[effect.stat] || effect.stat}低下`);
    } else if (effect.type === 'heal') {
      parts.push(`自身のHPを${Math.round((effect.percent || 0) * 100)}%回復`);
    }
  });

  return parts.join('／');
}

// ========================================================
// バトルロジック
// ========================================================
function delay(ms){ return new Promise(r=>setTimeout(r,ms/battleSpeed)); }

function aliveOf(team){ return team.map((f,i)=>({f,i})).filter(({f})=>f.hp>0); }

function pickTargets(enemies, targets) {
  const alive = enemies.filter(({ f }) => f.hp > 0);
  if (targets === 'all') return [...alive];
  const n = typeof targets === 'number' ? targets : 1;
  const sh = [...alive].sort(() => Math.random() - 0.5);
  return sh.slice(0, Math.min(n, alive.length));
}

// SPで使える技がある限りスキルを優先し、使えなくなったら通常攻撃連打に切り替える
function chooseSkillForAI(f) {
  const usable = f.skills.filter(s => f.sp >= s.sp);
  if (usable.length === 0) return null;
  return usable[Math.floor(Math.random() * usable.length)];
}

function applyStatus(target, statusName, turns) {
  target.status = statusName; // シンプル化のため状態異常は1枠のみ（新しいものが上書き）
  target.statusTurns = turns || null; // 混乱・無敵など期間限定の状態異常はターン数を持つ（nullは自然解除なし＝やけど/まひ）
}

function applyStageChange(target, stat, stages) {
  const key = stat + 'Stage';
  if (stat === 'crit') {
    target[key] = Math.max(0, Math.min(4, (target[key] || 0) + stages)); // 急所率は基準0%、負にはならない
  } else {
    target[key] = Math.max(-3, Math.min(4, (target[key] || 0) + stages));
  }
}

// ターン開始時に呼び、期間限定の状態異常(混乱・無敵など)を1ターン分減らして0で解除する
function tickStatusTurns(f) {
  if (f.statusTurns == null) return;
  f.statusTurns -= 1;
  if (f.statusTurns <= 0) { f.status = null; f.statusTurns = null; }
}

async function dealDamageToTargets(actor, isPlayer, targets, power, targetMul) {
  const koTargets = []; // 撃破したターゲット（機会キャラの追撃判定用）
  for (const tgt of targets) {
    if (tgt.f.hp <= 0) continue;
    // 無敵：1ターンの間、被弾した攻撃を1回だけ無効化して消費される
    if (tgt.f.status === 'invincible') {
      tgt.f.status = null; tgt.f.statusTurns = null;
      updateStatusBadges(!isPlayer, tgt.i, tgt.f);
      popup(!isPlayer, tgt.i, '無敵！', 'buff-pop');
      setLog(`${tgt.f.name}は攻撃を完全に防いだ！`);
      await delay(320);
      continue;
    }
    const atk = effectiveAtk(actor.f);
    const def = effectiveDef(tgt.f);
    const critRate = effectiveCritRate(actor.f);
    const { dmg, eff, isCrit } = calcDmg(power, atk, def, actor.f.element, tgt.f.element, targetMul, actor.f.rarity, tgt.f.rarity, critRate);
    tgt.f.hp = Math.max(0, tgt.f.hp - dmg);
    animHit(!isPlayer, tgt.i);
    updateBars(!isPlayer, tgt.i, tgt.f);
    popup(!isPlayer, tgt.i, `-${dmg}${isCrit ? '💥' : ''}`, 'skill-pop');
    if (isCrit) setLog(`${actor.f.name}の攻撃！ 会心の一撃！`);
    else if (eff === 2) setLog(`${actor.f.name}の攻撃！ 効果は抜群だ！`);
    else if (eff === 0.5) setLog(`${actor.f.name}の攻撃…効果はいまひとつ`);
    if (tgt.f.hp <= 0) {
      const u = document.getElementById(`${!isPlayer ? 'pu' : 'eu'}-${tgt.i}`);
      if (u) u.classList.add('fainted');
      koTargets.push(tgt);
    }
    await delay(320);
  }
  return koTargets;
}

// buff/heal/healSp効果の対象リストを解決する（self/ally/allAllies/enemy/allEnemies + count対応）
function resolveEffectTargets(effect, actor, isPlayer, enemyList) {
  const allyTeam = isPlayer ? aliveOf(playerTeam) : aliveOf(opponentTeam);
  const target = effect.target || 'self';
  const count = effect.count === 'all' ? 99 : (effect.count || 1);
  if (target === 'self') return [actor];
  if (target === 'ally') return pickTargets(allyTeam, count);
  if (target === 'allAllies') return allyTeam;
  if (target === 'enemy') return pickTargets(enemyList, count);
  if (target === 'allEnemies') return enemyList.filter(({ f }) => f.hp > 0);
  return [actor];
}

async function doAction(actor, enemies, isPlayer, skill) {
  if (actor.f.hp <= 0) return;

  // まひ判定（30%で行動不能）
  if (actor.f.status === 'paralysis' && Math.random() < 0.3) {
    setLog(`${actor.f.name}はしびれて動けない！`);
    await delay(300);
    tickBurn(actor, isPlayer);
    tickStatusTurns(actor.f);
    return;
  }

  const aliveEnemies = enemies.filter(({ f }) => f.hp > 0);
  if (!aliveEnemies.length) { tickBurn(actor, isPlayer); tickStatusTurns(actor.f); return; }

  // 混乱判定（40%で味方を攻撃してしまう）
  if (actor.f.status === 'confusion' && Math.random() < 0.4) {
    const allyTeam = (isPlayer ? aliveOf(playerTeam) : aliveOf(opponentTeam)).filter(({ i }) => i !== actor.i);
    if (allyTeam.length) {
      const tgt = allyTeam[Math.floor(Math.random() * allyTeam.length)];
      setLog(`${actor.f.name}は混乱している！ 味方を攻撃した！`);
      animAttack(isPlayer, actor.i);
      await delay(350);
      await dealDamageToTargets(actor, !isPlayer, [tgt], TIER_POWER['小'], GameData.getTargetMultiplier(1));
      tickBurn(actor, isPlayer);
      tickStatusTurns(actor.f);
      return;
    }
  }

  if (skill) {
    actor.f.sp = Math.max(0, actor.f.sp - skill.sp);
    updateBars(isPlayer, actor.i, actor.f);
    flash(isPlayer, actor.i);
    await delay(150);

    const isSelfSkill = skill.targets === 0;
    const targets = isSelfSkill ? [actor] : pickTargets(enemies, skill.targets);
    const power = skill.tier ? TIER_POWER[skill.tier] : 0;

    setLog(`${actor.f.name}の${skill.name}！`);
    await delay(500);

    let koTargets = [];
    for (const effect of skill.effects) {
      if (effect.type === 'damage') {
        koTargets = await dealDamageToTargets(actor, isPlayer, targets, power, GameData.getTargetMultiplier(skill.targets));
      } else if (effect.type === 'status') {
        for (const tgt of targets) {
          if (tgt.f.hp <= 0) continue;
          if (Math.random() < (effect.chance || 1)) {
            const turns = (effect.status === 'confusion') ? 1 : null;
            applyStatus(tgt.f, effect.status, turns);
            updateStatusBadges(!isPlayer, tgt.i, tgt.f);
            setLog(`${tgt.f.name}は${STATUS_LABEL[effect.status]}状態になった！`);
            await delay(200);
          }
        }
      } else if (effect.type === 'buff') {
        const isEnemyBuff = effect.target === 'enemy' || effect.target === 'allEnemies';
        // 敵対象の場合はダメージ効果と同じ標的(targets)を再利用する（別枠で敵を選び直さない）
        const buffTargets = isEnemyBuff ? targets : resolveEffectTargets(effect, actor, isPlayer, enemies);
        const buffSide = isEnemyBuff ? !isPlayer : isPlayer;
        for (const tgt of buffTargets) {
          if (tgt.f.hp <= 0) continue;
          if (Math.random() < (effect.chance || 1)) {
            applyStageChange(tgt.f, effect.stat, effect.stages);
            updateStatusBadges(buffSide, tgt.i, tgt.f);
            popup(buffSide, tgt.i, `${effect.stat.toUpperCase()}${effect.stages > 0 ? '↑' : '↓'}`, 'buff-pop');
          }
        }
        await delay(150);
      } else if (effect.type === 'heal') {
        const healTargets = resolveEffectTargets(effect, actor, isPlayer, enemies);
        for (const tgt of healTargets) {
          if (tgt.f.hp <= 0) continue;
          const healAmt = Math.round(tgt.f.maxHp * (effect.percent || 0));
          tgt.f.hp = Math.min(tgt.f.maxHp, tgt.f.hp + healAmt);
          updateBars(isPlayer, tgt.i, tgt.f);
          popup(isPlayer, tgt.i, `+${healAmt}`, 'buff-pop');
        }
        await delay(150);
      } else if (effect.type === 'healSp') {
        const healTargets = resolveEffectTargets(effect, actor, isPlayer, enemies);
        for (const tgt of healTargets) {
          if (tgt.f.hp <= 0) continue;
          const spAmt = Math.round(tgt.f.maxSp * (effect.percent || 0));
          tgt.f.sp = Math.min(tgt.f.maxSp, tgt.f.sp + spAmt);
          updateBars(isPlayer, tgt.i, tgt.f);
          popup(isPlayer, tgt.i, `SP+${spAmt}`, 'buff-pop');
        }
        await delay(150);
      } else if (effect.type === 'invincible') {
        const invTargets = resolveEffectTargets(effect, actor, isPlayer, enemies);
        for (const tgt of invTargets) {
          if (tgt.f.hp <= 0) continue;
          applyStatus(tgt.f, 'invincible', effect.turns || 1);
          updateStatusBadges(isPlayer, tgt.i, tgt.f);
          popup(isPlayer, tgt.i, '無敵付与', 'buff-pop');
        }
        await delay(150);
      } else if (effect.type === 'followup') {
        // 撃破した敵がいれば、残った敵1体へ追撃（機会キャラ専用）
        if (koTargets.length > 0) {
          const remaining = enemies.filter(({ f }) => f.hp > 0);
          if (remaining.length) {
            const followTgt = remaining[Math.floor(Math.random() * remaining.length)];
            setLog(`${actor.f.name}の追撃！`);
            await delay(200);
            await dealDamageToTargets(actor, isPlayer, [followTgt], TIER_POWER[effect.tier], GameData.getTargetMultiplier(effect.targets || 1));
          }
        }
      }
    }
  } else {
    // 通常攻撃（無属性・SP消費なし）
    const tgt = aliveEnemies[Math.floor(Math.random() * aliveEnemies.length)];
    setLog(`${actor.f.name}のこうげき！`);
    animAttack(isPlayer, actor.i);
    await delay(350);
    await dealDamageToTargets(actor, isPlayer, [tgt], TIER_POWER['小'], GameData.getTargetMultiplier(1));
  }

  tickBurn(actor, isPlayer);
  tickStatusTurns(actor.f);
}

// やけどの継続ダメージ（毎ターン終了時、最大HPの5%固定）
function tickBurn(actor, isPlayer) {
  if (actor.f.status === 'burn' && actor.f.hp > 0) {
    const dmg = Math.max(1, Math.round(actor.f.maxHp * 0.05));
    actor.f.hp = Math.max(0, actor.f.hp - dmg);
    updateBars(isPlayer, actor.i, actor.f);
    popup(isPlayer, actor.i, `-${dmg}`, '');
    if (actor.f.hp <= 0) {
      const u = document.getElementById(`${isPlayer ? 'pu' : 'eu'}-${actor.i}`);
      if (u) u.classList.add('fainted');
    }
  }
}

async function executeTurn(){
  turnCount++;
  const actors=[
    ...aliveOf(playerTeam).map(({f,i})=>({f,i,isPlayer:true})),
    ...aliveOf(opponentTeam).map(({f,i})=>({f,i,isPlayer:false})),
  ].sort((a,b)=>effectiveSpd(b.f)!==effectiveSpd(a.f)?effectiveSpd(b.f)-effectiveSpd(a.f):Math.random()-0.5);

  for(const actor of actors){
    if(!battleRunning) return;
    if(actor.f.hp<=0) continue;
    const enemies=actor.isPlayer?aliveOf(opponentTeam):aliveOf(playerTeam);

    let skill;
    if (actor.isPlayer && !isAuto && isStageMode()) {
      // 手動操作：誰のターンかを表示してからプレイヤー入力を待つ
      setLog(`${actor.f.name}のターン！ コマンドを選択してください`);
      const input = await waitForPlayerInput(actor);
      if (!battleRunning) return;
      if (input.type === 'run') return;
      if (input.type === 'skill') {
        const chosen = actor.f.skills[input.skillIndex];
        skill = (chosen && actor.f.sp >= chosen.sp) ? chosen : null;
      } else {
        skill = null;
      }
    } else {
      // オートor対人戦：AIが自動判断。誰のターンか一瞬表示してから行動
      setLog(`${actor.f.name}のターン！`);
      await delay(400);
      skill = chooseSkillForAI(actor.f);
    }

    await doAction(actor, enemies, actor.isPlayer, skill);
    if(!playerTeam.some(f=>f.hp>0)||!opponentTeam.some(f=>f.hp>0)){
      battleRunning=false;
      await delay(400);
      showResult();
      return;
    }
  }
}

async function battleLoop(){
  while(battleRunning){
    await executeTurn();
    if(!battleRunning) break;
    await delay(250);
  }
}

// ----- クエスト：ステージ選択（1〜20、クリアで次が解放） -----
function openQuestStageSelect() {
  battleRunning = false;
  const unlocked = GameData.getQuestUnlockedStage();
  const grid = document.getElementById('quest-stage-grid');
  grid.innerHTML = '';
  for (let n = 1; n <= GameData.QUEST_MAX_STAGE; n++) {
    const isUnlocked = n <= unlocked;
    const isCleared = n < unlocked;
    const btn = document.createElement('button');
    btn.className = 'stage-select-node' + (isCleared ? ' cleared' : isUnlocked ? ' unlocked' : ' locked');
    btn.innerHTML = isUnlocked
      ? `<span class="stage-node-num">${n}</span><span class="stage-node-cost">⚡${getStaminaCost(n)}</span>`
      : '🔒';
    btn.disabled = !isUnlocked;
    if (isUnlocked) btn.onclick = () => startQuestStage(n);
    grid.appendChild(btn);
  }
  document.getElementById('quest-stage-overlay').classList.add('show');
}
function closeQuestStageSelect() {
  document.getElementById('quest-stage-overlay').classList.remove('show');
}
function startQuestStage(n) {
  selectedQuestStage = n;
  closeQuestStageSelect();
  resetBattle();
}

// ダンジョン種別ごとの最大難易度（ゴールドダンジョンのみ10段階、他は5段階）
function getMaxDifficulty(kind) {
  return kind === 'gold' ? 10 : 5;
}

// 難易度バーを再描画。未解放の難易度は🔒でグレーアウトし選択不可にする
function renderDifficultyBar() {
  const bar = document.getElementById('difficulty-bar');
  const max = getMaxDifficulty(dungeonKind);
  const unlocked = GameData.getDungeonUnlockedDifficulty(dungeonKind, dungeonElement);
  bar.innerHTML = '';
  for (let n = 1; n <= max; n++) {
    const isUnlocked = n <= unlocked;
    const btn = document.createElement('button');
    btn.className = 'diff-btn' + (n === dungeonDifficulty ? ' active' : '') + (isUnlocked ? '' : ' locked');
    btn.id = `diff-${n}`;
    btn.innerHTML = isUnlocked
      ? `<span>${max > 5 ? String(n) : `難易度${n}`}</span><span class="diff-cost">⚡${getStaminaCost(n)}</span>`
      : '🔒';
    btn.disabled = !isUnlocked;
    if (isUnlocked) btn.onclick = () => setDifficulty(n);
    bar.appendChild(btn);
  }
}

// ダンジョン選択（ダンジョンモード内でのサブ選択）
// kind='element'→属性ダンジョン(element必須)／'gold'→ゴールドダンジョン／'rock'→岩ダンジョン／'title'→称号ダンジョン(element必須)
function enterDungeon(kind, element) {
  if (currentMode !== 'dungeon') return;
  dungeonKind = kind;
  dungeonElement = element || null;
  dungeonDifficulty = GameData.getDungeonUnlockedDifficulty(dungeonKind, dungeonElement);
  document.querySelectorAll('.dungeon-btn').forEach(b => b.classList.remove('active'));
  const btnId = kind === 'gold' ? 'dg-gold'
    : kind === 'rock' ? 'dg-rock'
    : kind === 'title' ? `dg-title-${element}`
    : `dg-${element}`;
  const btn = document.getElementById(btnId);
  if (btn) btn.classList.add('active');

  renderDifficultyBar();
  resetBattle();
}

function setDifficulty(n) {
  if (currentMode !== 'dungeon') return;
  const unlocked = GameData.getDungeonUnlockedDifficulty(dungeonKind, dungeonElement);
  if (n > unlocked) return; // 未解放は選べない
  dungeonDifficulty = n;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById(`diff-${n}`);
  if (btn) btn.classList.add('active');
  resetBattle();
}

  if (!isStageMode()) {
    el.classList.remove('show');

  el.classList.add('show');
